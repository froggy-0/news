name: Frontend Production Deploy

on:
  workflow_dispatch:

concurrency:
  group: frontend-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Validate deployment settings
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL }}
        run: |
          missing=()
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_PAGES_PROJECT_NAME NEXT_PUBLIC_R2_BASE_URL; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required deployment settings: ${missing[*]}" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: main

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Wait for public brief availability
        id: public-brief
        shell: bash
        env:
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL }}
        run: |
          set -euo pipefail
          base_url="${NEXT_PUBLIC_R2_BASE_URL%/}"
          index_url="${base_url}/index.json"

          for attempt in $(seq 1 10); do
            status="$(curl -sS -o /tmp/frontend-pages-index.json -w '%{http_code}' "${index_url}" || true)"
            if [ "${status}" = "200" ]; then
              break
            fi
            if [ "${attempt}" -eq 10 ]; then
              echo "Timed out waiting for ${index_url}" >&2
              exit 1
            fi
            sleep 6
          done

          latest_date="$(
            python3 -c 'import json; from pathlib import Path; data = json.loads(Path("/tmp/frontend-pages-index.json").read_text(encoding="utf-8")); dates = data.get("dates") or []; assert dates, "index.json does not contain any dates"; print(dates[0])'
          )"

          brief_url="${base_url}/briefs/${latest_date}.json"
          for attempt in $(seq 1 10); do
            status="$(curl -sS -o /tmp/frontend-pages-brief.json -w '%{http_code}' "${brief_url}" || true)"
            if [ "${status}" = "200" ]; then
              break
            fi
            if [ "${attempt}" -eq 10 ]; then
              echo "Timed out waiting for ${brief_url}" >&2
              exit 1
            fi
            sleep 6
          done

          echo "latest_date=${latest_date}" >> "$GITHUB_OUTPUT"
          echo "index_url=${index_url}" >> "$GITHUB_OUTPUT"
          echo "brief_url=${brief_url}" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL }}

      - name: Deploy production to Cloudflare Pages
        working-directory: frontend
        run: npx wrangler@4 pages deploy out --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME" --commit-dirty=true --commit-message="Deploy $GITHUB_SHA"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}

      - name: Summarize frontend deploy
        shell: bash
        env:
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL }}
        run: |
          {
            echo "## Frontend production deploy"
            echo "- Git ref: \`main\`"
            echo "- Pages project: \`${CLOUDFLARE_PAGES_PROJECT_NAME}\`"
            echo "- R2 public URL: \`${NEXT_PUBLIC_R2_BASE_URL}\`"
            echo "- Latest public brief date: \`${{ steps.public-brief.outputs.latest_date }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
