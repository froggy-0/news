name: Morning Market Brief

on:
  schedule:
    # 08:00 KST daily == 23:00 UTC (previous day)
    - cron: "0 23 * * *"
  workflow_dispatch:

concurrency:
  group: morning-brief-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Restore BTC ETF snapshot cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/btc_etf
          key: btc-etf-snapshots-${{ github.run_id }}
          restore-keys: |
            btc-etf-snapshots-

      - name: Run tests
        run: pytest -q

      - name: Restore Gmail OAuth files
        shell: bash
        run: |
          if [ -z "${GMAIL_CREDENTIALS_JSON_B64}" ] || [ -z "${GMAIL_TOKEN_JSON_B64}" ]; then
            echo "Missing Gmail OAuth secrets." >&2
            exit 1
          fi
          echo "${GMAIL_CREDENTIALS_JSON_B64}" | base64 -d > credentials.json
          echo "${GMAIL_TOKEN_JSON_B64}" | base64 -d > token.json
        env:
          GMAIL_CREDENTIALS_JSON_B64: ${{ secrets.GMAIL_CREDENTIALS_JSON_B64 }}
          GMAIL_TOKEN_JSON_B64: ${{ secrets.GMAIL_TOKEN_JSON_B64 }}

      - name: Run pipeline
        shell: bash
        run: |
          set -euo pipefail
          attempt=1
          max_attempts=2
          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "Pipeline attempt ${attempt}/${max_attempts}"
            if python main.py once 2>&1 | tee run.log; then
              exit 0
            fi
            if [ "${attempt}" -eq "${max_attempts}" ]; then
              echo "Pipeline failed after retries." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 20
          done
        env:
          CI: "true"
          TIMEZONE: Asia/Seoul
          CACHE_DIR: .cache
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
          OPENAI_BRIEF_VALIDATION_ENABLED: ${{ vars.OPENAI_BRIEF_VALIDATION_ENABLED || 'true' }}
          OPENAI_BRIEF_VALIDATION_MODEL: ${{ vars.OPENAI_BRIEF_VALIDATION_MODEL || vars.OPENAI_MODEL || 'gpt-5-mini' }}
          OPENAI_BRIEF_MAX_REWRITES: ${{ vars.OPENAI_BRIEF_MAX_REWRITES || '1' }}
          OPENAI_WEB_SEARCH_ENABLED: ${{ vars.OPENAI_WEB_SEARCH_ENABLED || 'true' }}
          OPENAI_WEB_SEARCH_MODEL: ${{ vars.OPENAI_WEB_SEARCH_MODEL || vars.OPENAI_MODEL || 'gpt-5-mini' }}
          OPENAI_WEB_SEARCH_MAX_RESULTS: ${{ vars.OPENAI_WEB_SEARCH_MAX_RESULTS || '3' }}
          OPENAI_REASONING_EFFORT: ${{ vars.OPENAI_REASONING_EFFORT || 'low' }}
          OPENAI_MAX_OUTPUT_TOKENS: ${{ vars.OPENAI_MAX_OUTPUT_TOKENS || '1700' }}
          OPENAI_PROMPT_CACHE_KEY: ${{ vars.OPENAI_PROMPT_CACHE_KEY || 'morning-market-brief' }}
          PROMPT_TEMPLATE_VERSION: ${{ vars.PROMPT_TEMPLATE_VERSION || 'market_brief_v3' }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          GMAIL_CREDENTIALS_FILE: credentials.json
          GMAIL_TOKEN_FILE: token.json
          GMAIL_OAUTH_INTERACTIVE: "false"
          SEND_EMAIL: "true"
          MAX_NEWS_ITEMS: "5"

      - name: Save BTC ETF snapshot cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/btc_etf
          key: btc-etf-snapshots-${{ github.run_id }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: morning-brief-artifacts
          path: |
            outputs/*.md
            run.log
          if-no-files-found: warn
