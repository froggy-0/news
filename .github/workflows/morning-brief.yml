name: Morning Market Brief

on:
  schedule:
    # 07:54 KST daily == 22:54 UTC (previous day)
    - cron: "54 22 * * *"
  workflow_dispatch:

concurrency:
  group: morning-brief-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Compute cache keys
        id: cache-meta
        shell: bash
        run: |
          echo "day=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Restore pip cache
        id: cache-pip
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            pip-

      - name: Install dependencies
        run: pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Restore BTC ETF snapshot cache
        id: cache-btc-etf
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/btc_etf
          key: btc-etf-snapshots-${{ steps.cache-meta.outputs.day }}
          restore-keys: |
            btc-etf-snapshots-

      - name: Restore market snapshot cache
        id: cache-market
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/market
          key: market-snapshot-${{ steps.cache-meta.outputs.day }}
          restore-keys: |
            market-snapshot-

      - name: Resolve cache restore status
        id: cache-status
        shell: bash
        run: |
          if [ "${{ steps.cache-btc-etf.outputs.cache-hit }}" = "true" ]; then
            echo "btc_etf_status=primary_hit" >> "$GITHUB_OUTPUT"
          elif [ -f .cache/btc_etf/official_snapshots.json ]; then
            echo "btc_etf_status=restore_hit" >> "$GITHUB_OUTPUT"
          else
            echo "btc_etf_status=miss" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ steps.cache-market.outputs.cache-hit }}" = "true" ]; then
            echo "market_status=primary_hit" >> "$GITHUB_OUTPUT"
          elif [ -f .cache/market/last_success_points.json ]; then
            echo "market_status=restore_hit" >> "$GITHUB_OUTPUT"
          else
            echo "market_status=miss" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ steps.cache-pip.outputs.cache-hit }}" = "true" ]; then
            echo "pip_status=primary_hit" >> "$GITHUB_OUTPUT"
          elif [ -d ~/.cache/pip ]; then
            echo "pip_status=restore_hit" >> "$GITHUB_OUTPUT"
          else
            echo "pip_status=miss" >> "$GITHUB_OUTPUT"
          fi

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Run lint
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest -q

      - name: Restore Gmail OAuth files
        shell: bash
        run: |
          if [ -z "${GMAIL_CREDENTIALS_JSON_B64}" ] || [ -z "${GMAIL_TOKEN_JSON_B64}" ]; then
            echo "Missing Gmail OAuth secrets." >&2
            exit 1
          fi
          echo "${GMAIL_CREDENTIALS_JSON_B64}" | base64 -d > credentials.json
          echo "${GMAIL_TOKEN_JSON_B64}" | base64 -d > token.json
        env:
          GMAIL_CREDENTIALS_JSON_B64: ${{ secrets.GMAIL_CREDENTIALS_JSON_B64 }}
          GMAIL_TOKEN_JSON_B64: ${{ secrets.GMAIL_TOKEN_JSON_B64 }}

      - name: Run pipeline
        shell: bash
        run: |
          set -euo pipefail
          attempt=1
          max_attempts=2
          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "Pipeline attempt ${attempt}/${max_attempts}"
            if python main.py once 2>&1 | tee run.log; then
              exit 0
            fi
            if [ "${attempt}" -eq "${max_attempts}" ]; then
              echo "Pipeline failed after retries." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 20
          done
        env:
          CI: "true"
          TIMEZONE: Asia/Seoul
          CACHE_DIR: .cache
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini-2025-08-07' }}
          OPENAI_BRIEF_VALIDATION_ENABLED: ${{ vars.OPENAI_BRIEF_VALIDATION_ENABLED || 'true' }}
          OPENAI_BRIEF_VALIDATION_MODEL: ${{ vars.OPENAI_BRIEF_VALIDATION_MODEL || vars.OPENAI_MODEL || 'gpt-5-mini-2025-08-07' }}
          OPENAI_BRIEF_MAX_REWRITES: ${{ vars.OPENAI_BRIEF_MAX_REWRITES || '1' }}
          OPENAI_REASONING_EFFORT: ${{ vars.OPENAI_REASONING_EFFORT || 'low' }}
          OPENAI_MAX_OUTPUT_TOKENS: '50000'
          OPENAI_PROMPT_CACHE_KEY: ${{ vars.OPENAI_PROMPT_CACHE_KEY || 'morning-market-brief' }}
          PROMPT_TEMPLATE_VERSION: ${{ vars.PROMPT_TEMPLATE_VERSION || 'market_brief_v4' }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_MODEL: ${{ vars.GROK_MODEL || 'grok-4.20-beta-latest-non-reasoning' }}
          GROK_X_KEYWORD_SEARCH_ENABLED: ${{ vars.GROK_X_KEYWORD_SEARCH_ENABLED || 'true' }}
          RESEARCH_PROVIDER: ${{ vars.RESEARCH_PROVIDER || 'perplexity' }}
          ENABLE_LEGACY_NEWS_FALLBACK: ${{ vars.ENABLE_LEGACY_NEWS_FALLBACK || 'true' }}
          ENABLE_OFFICIAL_X_SIGNALS: ${{ vars.ENABLE_OFFICIAL_X_SIGNALS || 'true' }}
          OFFICIAL_X_LOOKBACK_HOURS: ${{ vars.OFFICIAL_X_LOOKBACK_HOURS || '48' }}
          OFFICIAL_X_MAX_ITEMS: ${{ vars.OFFICIAL_X_MAX_ITEMS || '4' }}
          PERPLEXITY_USE_SONAR_SUMMARY: ${{ vars.PERPLEXITY_USE_SONAR_SUMMARY || 'true' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          R2_PUBLIC_BUCKET: ${{ vars.R2_PUBLIC_BUCKET || '' }}
          R2_S3_ENDPOINT: ${{ vars.R2_S3_ENDPOINT || '' }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || '' }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || '' }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          GMAIL_CREDENTIALS_FILE: credentials.json
          GMAIL_TOKEN_FILE: token.json
          GMAIL_OAUTH_INTERACTIVE: "false"
          SEND_EMAIL: "true"
          MAX_NEWS_ITEMS: "5"
          CACHE_BTC_ETF_KEY: btc-etf-snapshots-${{ steps.cache-meta.outputs.day }}
          CACHE_BTC_ETF_HIT: ${{ steps.cache-btc-etf.outputs.cache-hit || 'false' }}
          CACHE_BTC_ETF_STATUS: ${{ steps.cache-status.outputs.btc_etf_status }}
          CACHE_MARKET_KEY: market-snapshot-${{ steps.cache-meta.outputs.day }}
          CACHE_MARKET_HIT: ${{ steps.cache-market.outputs.cache-hit || 'false' }}
          CACHE_MARKET_STATUS: ${{ steps.cache-status.outputs.market_status }}
          CACHE_PIP_KEY: pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          CACHE_PIP_HIT: ${{ steps.cache-pip.outputs.cache-hit || 'false' }}
          CACHE_PIP_STATUS: ${{ steps.cache-status.outputs.pip_status }}

      - name: Summarize public brief publish
        if: always()
        shell: bash
        env:
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL || '' }}
        run: |
          branch_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr '/' '-')"
          latest_date="unavailable"
          if [ -f outputs/public/index.json ]; then
            latest_date="$(
              python3 -c 'import json; from pathlib import Path; data = json.loads(Path("outputs/public/index.json").read_text(encoding="utf-8")); dates = data.get("dates") or []; print(dates[0] if dates else "unavailable")'
            )"
          fi

          {
            echo "## Public brief publish"
            echo "- Latest public brief date: \`${latest_date}\`"
            echo "- R2 public URL: \`${NEXT_PUBLIC_R2_BASE_URL:-not set}\`"
            echo "- Pages preview branch: \`${branch_slug}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save BTC ETF snapshot cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/btc_etf
          key: btc-etf-snapshots-${{ steps.cache-meta.outputs.day }}

      - name: Save market snapshot cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/market
          key: market-snapshot-${{ steps.cache-meta.outputs.day }}

      - name: Save pip cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: morning-brief-artifacts
          path: |
            outputs/*.md
            outputs/public/**/*.json
            outputs/observability/*.json
            run.log
          if-no-files-found: warn

  deploy-frontend:
    needs: run-brief
    if: ${{ needs.run-brief.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Validate deployment settings
        id: validate
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL }}
        run: |
          missing=()
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_PAGES_PROJECT_NAME NEXT_PUBLIC_R2_BASE_URL; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "Skipping frontend preview deploy because required settings are missing: ${missing[*]}"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize skipped frontend deploy
        if: steps.validate.outputs.skip == 'true'
        shell: bash
        run: |
          {
            echo "## Frontend preview deploy"
            echo "- Skipped because required settings are missing: \`${{ steps.validate.outputs.missing }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        if: steps.validate.outputs.skip != 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node
        if: steps.validate.outputs.skip != 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve preview branch slug
        if: steps.validate.outputs.skip != 'true'
        id: preview-branch
        shell: bash
        run: |
          branch_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr '/' '-')"
          echo "branch_slug=${branch_slug}" >> "$GITHUB_OUTPUT"

      - name: Wait for public brief availability
        if: steps.validate.outputs.skip != 'true'
        id: public-brief
        shell: bash
        env:
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL }}
        run: |
          set -euo pipefail
          base_url="${NEXT_PUBLIC_R2_BASE_URL%/}"
          index_url="${base_url}/index.json"

          for attempt in $(seq 1 10); do
            status="$(curl -sS -o /tmp/public-index.json -w '%{http_code}' "${index_url}" || true)"
            if [ "${status}" = "200" ]; then
              break
            fi
            if [ "${attempt}" -eq 10 ]; then
              echo "Timed out waiting for ${index_url}" >&2
              exit 1
            fi
            sleep 6
          done

          latest_date="$(
            python3 -c 'import json; from pathlib import Path; data = json.loads(Path("/tmp/public-index.json").read_text(encoding="utf-8")); dates = data.get("dates") or []; assert dates, "index.json does not contain any dates"; print(dates[0])'
          )"

          brief_url="${base_url}/briefs/${latest_date}.json"
          for attempt in $(seq 1 10); do
            status="$(curl -sS -o /tmp/public-brief.json -w '%{http_code}' "${brief_url}" || true)"
            if [ "${status}" = "200" ]; then
              break
            fi
            if [ "${attempt}" -eq 10 ]; then
              echo "Timed out waiting for ${brief_url}" >&2
              exit 1
            fi
            sleep 6
          done

          echo "latest_date=${latest_date}" >> "$GITHUB_OUTPUT"
          echo "index_url=${index_url}" >> "$GITHUB_OUTPUT"
          echo "brief_url=${brief_url}" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        if: steps.validate.outputs.skip != 'true'
        working-directory: frontend
        run: npm ci

      - name: Build static frontend
        if: steps.validate.outputs.skip != 'true'
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL }}

      - name: Deploy preview to Cloudflare Pages
        if: steps.validate.outputs.skip != 'true'
        run: npx wrangler@4 pages deploy frontend/out --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME" --branch="$DEPLOY_BRANCH" --commit-dirty=true --commit-message="Deploy $GITHUB_SHA"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          DEPLOY_BRANCH: ${{ steps.preview-branch.outputs.branch_slug }}

      - name: Summarize frontend preview deploy
        if: steps.validate.outputs.skip != 'true'
        shell: bash
        env:
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL }}
        run: |
          preview_url="https://${{ steps.preview-branch.outputs.branch_slug }}.${CLOUDFLARE_PAGES_PROJECT_NAME}.pages.dev"
          {
            echo "## Frontend preview deploy"
            echo "- Pages project: \`${CLOUDFLARE_PAGES_PROJECT_NAME}\`"
            echo "- Preview branch: \`${{ steps.preview-branch.outputs.branch_slug }}\`"
            echo "- Preview URL: ${preview_url}"
            echo "- R2 public URL: \`${NEXT_PUBLIC_R2_BASE_URL}\`"
            echo "- Latest public brief date: \`${{ steps.public-brief.outputs.latest_date }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
