name: Generate Sovereign Briefing

on:
  workflow_dispatch:
  schedule:
    # 07:40 KST daily. GitHub cron runs in UTC.
    - cron: "40 22 * * *"

concurrency:
  group: morning-brief-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-brief:
    name: Generate and Publish Sovereign Briefing
    needs: run-sentiment-join
    if: ${{ needs.run-sentiment-join.result == 'success' || needs.run-sentiment-join.result == 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          aws-region: ap-northeast-2
          role-to-assume: arn:aws:iam::254849613915:role/kr-pr-ses-news-v1a

      - name: Compute cache keys
        id: cache-meta
        shell: bash
        run: |
          echo "day=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Restore pip cache
        id: cache-pip
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'requirements-ml.txt') }}
          restore-keys: |
            pip-

      - name: Install Python dependencies
        run: |
          pip install --disable-pip-version-check -r requirements-dev.txt
          pip install --disable-pip-version-check -r requirements-ml.txt

      - name: Restore BTC ETF snapshot cache
        id: cache-btc-etf
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/btc_etf
          key: btc-etf-snapshots-${{ steps.cache-meta.outputs.day }}
          restore-keys: |
            btc-etf-snapshots-

      - name: Restore market snapshot cache
        id: cache-market
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/market
          key: market-snapshot-${{ steps.cache-meta.outputs.day }}
          restore-keys: |
            market-snapshot-

      - name: Restore KIS token cache
        id: cache-kis-token
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/kis_token
          key: kis-token-${{ steps.cache-meta.outputs.day }}
          restore-keys: |
            kis-token-

      - name: Resolve cache restore status
        id: cache-status
        shell: bash
        run: |
          if [ "${{ steps.cache-btc-etf.outputs.cache-hit }}" = "true" ]; then
            echo "btc_etf_status=primary_hit" >> "$GITHUB_OUTPUT"
          elif [ -f .cache/btc_etf/official_snapshots.json ]; then
            echo "btc_etf_status=restore_hit" >> "$GITHUB_OUTPUT"
          else
            echo "btc_etf_status=miss" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ steps.cache-market.outputs.cache-hit }}" = "true" ]; then
            echo "market_status=primary_hit" >> "$GITHUB_OUTPUT"
          elif [ -f .cache/market/last_success_points.json ]; then
            echo "market_status=restore_hit" >> "$GITHUB_OUTPUT"
          else
            echo "market_status=miss" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ steps.cache-pip.outputs.cache-hit }}" = "true" ]; then
            echo "pip_status=primary_hit" >> "$GITHUB_OUTPUT"
          elif [ -d ~/.cache/pip ]; then
            echo "pip_status=restore_hit" >> "$GITHUB_OUTPUT"
          else
            echo "pip_status=miss" >> "$GITHUB_OUTPUT"
          fi

      - name: Download sentiment analysis artifact (latest.json)
        shell: bash
        env:
          R2_S3_ENDPOINT: ${{ vars.R2_S3_ENDPOINT || '' }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || '' }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || '' }}
          R2_PUBLIC_BUCKET: ${{ vars.R2_PUBLIC_BUCKET || '' }}
        run: |
          set -euo pipefail
          if [ -z "${R2_PUBLIC_BUCKET}" ] || [ -z "${R2_S3_ENDPOINT}" ]; then
            echo "[workflow] R2 설정 없음 — latest.json 다운로드 건너뜀"
            exit 0
          fi
          mkdir -p data/sentiment_join
          python3 - <<'EOF'
          import os, sys, boto3, json
          from pathlib import Path

          client = boto3.client(
              "s3",
              endpoint_url=os.environ["R2_S3_ENDPOINT"],
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              region_name="auto",
          )
          bucket = os.environ["R2_PUBLIC_BUCKET"]
          dest = Path("data/sentiment_join/latest.json")
          try:
              obj = client.get_object(Bucket=bucket, Key="analytics/sentiment/latest.json")
              dest.write_bytes(obj["Body"].read())
              print(f"[workflow] latest.json 다운로드 완료 ({dest.stat().st_size} bytes)")
          except Exception as e:
              print(f"[workflow] latest.json 다운로드 실패 (무시): {e}", file=sys.stderr)
          EOF

      - name: Run brief generation pipeline
        shell: bash
        run: |
          set -euo pipefail
          attempt=1
          max_attempts=2
          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "[workflow] Pipeline attempt ${attempt}/${max_attempts}"
            if python main.py once 2>&1 | tee run.log; then
              exit 0
            fi
            if [ "${attempt}" -eq "${max_attempts}" ]; then
              echo "[workflow] Pipeline failed after retries." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 20
          done
        env:
          CI: "true"
          TIMEZONE: Asia/Seoul
          CACHE_DIR: .cache
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini-2025-08-07' }}
          OPENAI_BRIEF_VALIDATION_ENABLED: ${{ vars.OPENAI_BRIEF_VALIDATION_ENABLED || 'true' }}
          OPENAI_BRIEF_VALIDATION_MODEL: ${{ vars.OPENAI_BRIEF_VALIDATION_MODEL || vars.OPENAI_MODEL || 'gpt-5-mini-2025-08-07' }}
          OPENAI_BRIEF_MAX_REWRITES: ${{ vars.OPENAI_BRIEF_MAX_REWRITES || '1' }}
          OPENAI_REASONING_EFFORT: ${{ vars.OPENAI_REASONING_EFFORT || 'low' }}
          OPENAI_MAX_OUTPUT_TOKENS: '50000'
          OPENAI_PROMPT_CACHE_KEY: ${{ vars.OPENAI_PROMPT_CACHE_KEY || 'morning-market-brief' }}
          PROMPT_TEMPLATE_VERSION: ${{ vars.PROMPT_TEMPLATE_VERSION || 'market_brief_v4' }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY || '' }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET || '' }}
          KIS_TOKEN_CACHE_PATH: .cache/kis_token/token.json
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          THENEWSAPI_KEY: ${{ secrets.THENEWSAPI_KEY }}
          MARKETAUX_KEY: ${{ secrets.MARKETAUX_KEY }}
          COINDESK_NEWS_ENABLED: ${{ vars.COINDESK_NEWS_ENABLED || 'true' }}
          COINDESK_NEWS_LOOKBACK_HOURS: ${{ vars.COINDESK_NEWS_LOOKBACK_HOURS || '36' }}
          COINDESK_NEWS_WEEKEND_LOOKBACK_HOURS: ${{ vars.COINDESK_NEWS_WEEKEND_LOOKBACK_HOURS || '72' }}
          COINDESK_NEWS_MAX_ITEMS: ${{ vars.COINDESK_NEWS_MAX_ITEMS || '12' }}
          COINDESK_NEWS_CATEGORIES: ${{ vars.COINDESK_NEWS_CATEGORIES || 'BTC' }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_MODEL: ${{ vars.GROK_MODEL || 'grok-4.20-beta-latest-non-reasoning' }}
          GROK_X_KEYWORD_SEARCH_ENABLED: ${{ vars.GROK_X_KEYWORD_SEARCH_ENABLED || 'true' }}
          GROK_X_SEARCH_MAX_ITEMS: ${{ vars.GROK_X_SEARCH_MAX_ITEMS || '2' }}
          RESEARCH_PROVIDER: ${{ vars.RESEARCH_PROVIDER || 'perplexity' }}
          ENABLE_LEGACY_NEWS_FALLBACK: ${{ vars.ENABLE_LEGACY_NEWS_FALLBACK || 'true' }}
          ENABLE_OFFICIAL_X_SIGNALS: ${{ vars.ENABLE_OFFICIAL_X_SIGNALS || 'true' }}
          OFFICIAL_X_LOOKBACK_HOURS: ${{ vars.OFFICIAL_X_LOOKBACK_HOURS || '48' }}
          OFFICIAL_X_MAX_ITEMS: ${{ vars.OFFICIAL_X_MAX_ITEMS || '2' }}
          PERPLEXITY_USE_SONAR_SUMMARY: ${{ vars.PERPLEXITY_USE_SONAR_SUMMARY || 'true' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          R2_PUBLIC_BUCKET: ${{ vars.R2_PUBLIC_BUCKET || '' }}
          R2_S3_ENDPOINT: ${{ vars.R2_S3_ENDPOINT || '' }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || '' }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || '' }}
          AWS_REGION: ap-northeast-2
          SES_SENDER: no-reply@sovereignbriefing.com
          PUBLIC_APP_BASE_URL: ${{ vars.PUBLIC_APP_BASE_URL || '' }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL || '' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
          SUBSCRIPTION_TOKEN_SECRET: ${{ secrets.SUBSCRIPTION_TOKEN_SECRET || '' }}
          SEND_EMAIL: "true"
          MAX_NEWS_ITEMS: "5"
          CACHE_BTC_ETF_KEY: btc-etf-snapshots-${{ steps.cache-meta.outputs.day }}
          CACHE_BTC_ETF_HIT: ${{ steps.cache-btc-etf.outputs.cache-hit || 'false' }}
          CACHE_BTC_ETF_STATUS: ${{ steps.cache-status.outputs.btc_etf_status }}
          CACHE_MARKET_KEY: market-snapshot-${{ steps.cache-meta.outputs.day }}
          CACHE_MARKET_HIT: ${{ steps.cache-market.outputs.cache-hit || 'false' }}
          CACHE_MARKET_STATUS: ${{ steps.cache-status.outputs.market_status }}
          CACHE_PIP_KEY: pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'requirements-ml.txt') }}
          CACHE_PIP_HIT: ${{ steps.cache-pip.outputs.cache-hit || 'false' }}
          CACHE_PIP_STATUS: ${{ steps.cache-status.outputs.pip_status }}

      - name: Fill signal outcomes (7일 전 신호 결과 채우기)
        if: success()
        continue-on-error: true
        shell: bash
        run: python scripts/fill_signal_outcomes.py
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL || '' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}

      - name: Publish brief summary
        if: always()
        shell: bash
        env:
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL || '' }}
        run: |
          latest_date="unavailable"
          if [ -f outputs/public/index.json ]; then
            latest_date="$(
              python3 -c 'import json; from pathlib import Path; data = json.loads(Path("outputs/public/index.json").read_text(encoding="utf-8")); dates = data.get("dates") or []; print(dates[0] if dates else "unavailable")'
            )"
          fi

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            deploy_target="production"
          else
            deploy_target="preview"
          fi

          {
            echo "## Public brief publish"
            echo "- Latest public brief date: \`${latest_date}\`"
            echo "- R2 public URL: \`${NEXT_PUBLIC_R2_BASE_URL:-not set}\`"
            echo "- Pages deploy target: \`${deploy_target}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save KIS token cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/kis_token
          key: kis-token-${{ steps.cache-meta.outputs.day }}

      - name: Save BTC ETF cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/btc_etf
          key: btc-etf-snapshots-${{ steps.cache-meta.outputs.day }}

      - name: Save market cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/market
          key: market-snapshot-${{ steps.cache-meta.outputs.day }}

      - name: Save pip cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'requirements-ml.txt') }}

      - name: Upload brief run artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: morning-brief-artifacts
          path: |
            outputs/*.md
            outputs/public/**/*.json
            outputs/observability/*.json
            outputs/observability/*.jsonl
            run.log
          if-no-files-found: warn

  run-sentiment-join:
    name: Build Sentiment Time Join Parquet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          aws-region: ap-northeast-2
          role-to-assume: arn:aws:iam::254849613915:role/kr-pr-ses-news-v1a

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Compute cache keys
        id: cache-meta
        shell: bash
        run: |
          echo "day=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Restore pip cache
        id: cache-pip
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-sentiment-join-${{ hashFiles('requirements.txt', 'requirements-analysis.txt') }}
          restore-keys: |
            pip-sentiment-join-

      - name: Install Python dependencies
        run: |
          pip install --disable-pip-version-check -r requirements.txt
          pip install --disable-pip-version-check -r requirements-analysis.txt

      - name: Save pip cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-sentiment-join-${{ hashFiles('requirements.txt', 'requirements-analysis.txt') }}

      - name: Restore KIS token cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/kis_token
          key: kis-token-${{ steps.cache-meta.outputs.day }}
          restore-keys: |
            kis-token-

      - name: Run sentiment time join
        shell: bash
        run: make sentiment-join PYTHON=python
        env:
          R2_PUBLIC_BUCKET: ${{ vars.R2_PUBLIC_BUCKET || '' }}
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL || '' }}
          R2_S3_ENDPOINT: ${{ vars.R2_S3_ENDPOINT || '' }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || '' }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || '' }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY || '' }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET || '' }}
          KIS_TOKEN_CACHE_PATH: .cache/kis_token/token.json
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SENTIMENT_JOIN_LOOKBACK_DAYS: ${{ vars.SENTIMENT_JOIN_LOOKBACK_DAYS || '540' }}
          SENTIMENT_JOIN_RETAIN_DAYS: ${{ vars.SENTIMENT_JOIN_RETAIN_DAYS || '90' }}
          SENTIMENT_JOIN_BINANCE_KEY: ${{ secrets.SENTIMENT_JOIN_BINANCE_KEY || '' }}
          FUTURES_LAMBDA_ARN: ${{ vars.FUTURES_LAMBDA_ARN || '' }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL || '' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}

      - name: Save KIS token cache
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: .cache/kis_token
          key: kis-token-${{ steps.cache-meta.outputs.day }}

      - name: Upload sentiment join artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sentiment-join-artifacts
          path: |
            data/sentiment_join/master_*.parquet
            data/sentiment_join/latest.json
            data/sentiment_join/[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9].json
            data/sentiment_join/vol_regime_v2_drift.jsonl
            data/sentiment_join/backfill_manifest.json
          if-no-files-found: warn

  deploy-frontend:
    name: Deploy Frontend After Successful Analysis Artifact Upload
    needs:
      - run-brief
      - run-sentiment-join
    if: ${{ needs.run-brief.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Validate frontend deploy settings
        id: validate
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL }}
        run: |
          missing=()
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_PAGES_PROJECT_NAME NEXT_PUBLIC_R2_BASE_URL; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "Skipping frontend deploy because required settings are missing: ${missing[*]}"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish skipped deploy summary
        if: steps.validate.outputs.skip == 'true'
        shell: bash
        run: |
          {
            echo "## Frontend deploy"
            echo "- Skipped because required settings are missing: \`${{ steps.validate.outputs.missing }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        if: steps.validate.outputs.skip != 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        if: steps.validate.outputs.skip != 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve deploy target
        if: steps.validate.outputs.skip != 'true'
        id: deploy-target
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "target=production" >> "$GITHUB_OUTPUT"
            echo "branch_slug=" >> "$GITHUB_OUTPUT"
          else
            branch_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr '/' '-')"
            echo "target=preview" >> "$GITHUB_OUTPUT"
            echo "branch_slug=${branch_slug}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for latest public brief
        if: steps.validate.outputs.skip != 'true'
        id: public-brief
        shell: bash
        env:
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL }}
        run: |
          set -euo pipefail
          base_url="${NEXT_PUBLIC_R2_BASE_URL%/}"
          index_url="${base_url}/index.json"

          for attempt in $(seq 1 10); do
            status="$(curl -sS -o /tmp/public-index.json -w '%{http_code}' "${index_url}" || true)"
            if [ "${status}" = "200" ]; then
              break
            fi
            if [ "${attempt}" -eq 10 ]; then
              echo "Timed out waiting for ${index_url}" >&2
              exit 1
            fi
            sleep 6
          done

          latest_date="$(
            python3 -c 'import json; from pathlib import Path; data = json.loads(Path("/tmp/public-index.json").read_text(encoding="utf-8")); dates = data.get("dates") or []; assert dates, "index.json does not contain any dates"; print(dates[0])'
          )"

          brief_url="${base_url}/briefs/${latest_date}.json"
          for attempt in $(seq 1 10); do
            status="$(curl -sS -o /tmp/public-brief.json -w '%{http_code}' "${brief_url}" || true)"
            if [ "${status}" = "200" ]; then
              break
            fi
            if [ "${attempt}" -eq 10 ]; then
              echo "Timed out waiting for ${brief_url}" >&2
              exit 1
            fi
            sleep 6
          done

          echo "latest_date=${latest_date}" >> "$GITHUB_OUTPUT"
          echo "index_url=${index_url}" >> "$GITHUB_OUTPUT"
          echo "brief_url=${brief_url}" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        if: steps.validate.outputs.skip != 'true'
        working-directory: frontend
        run: npm ci

      - name: Build static frontend bundle
        if: steps.validate.outputs.skip != 'true'
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL }}

      - name: Deploy preview build to Cloudflare Pages
        if: steps.validate.outputs.skip != 'true' && steps.deploy-target.outputs.target == 'preview'
        working-directory: frontend
        run: npx wrangler@4 pages deploy out --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME" --branch="$DEPLOY_BRANCH" --commit-dirty=true --commit-message="Deploy $GITHUB_SHA"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          DEPLOY_BRANCH: ${{ steps.deploy-target.outputs.branch_slug }}

      - name: Deploy production build to Cloudflare Pages
        if: steps.validate.outputs.skip != 'true' && steps.deploy-target.outputs.target == 'production'
        working-directory: frontend
        run: npx wrangler@4 pages deploy out --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME" --commit-dirty=true --commit-message="Deploy $GITHUB_SHA"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}

      - name: Publish frontend deploy summary
        if: steps.validate.outputs.skip != 'true'
        shell: bash
        env:
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          NEXT_PUBLIC_R2_BASE_URL: ${{ vars.NEXT_PUBLIC_R2_BASE_URL }}
        run: |
          if [ "${{ steps.deploy-target.outputs.target }}" = "preview" ]; then
            deploy_url="https://${{ steps.deploy-target.outputs.branch_slug }}.${CLOUDFLARE_PAGES_PROJECT_NAME}.pages.dev"
            deploy_mode="preview"
          else
            deploy_url="configured production domain"
            deploy_mode="production"
          fi

          {
            echo "## Frontend deploy"
            echo "- Pages project: \`${CLOUDFLARE_PAGES_PROJECT_NAME}\`"
            echo "- Deploy mode: \`${deploy_mode}\`"
            if [ "${deploy_mode}" = "preview" ]; then
              echo "- Preview branch: \`${{ steps.deploy-target.outputs.branch_slug }}\`"
            fi
            echo "- Deploy URL: ${deploy_url}"
            echo "- R2 public URL: \`${NEXT_PUBLIC_R2_BASE_URL}\`"
            echo "- Latest public brief date: \`${{ steps.public-brief.outputs.latest_date }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
