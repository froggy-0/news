name: Repository Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Python Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Restore pip cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'requirements-analysis.txt') }}
          restore-keys: |
            pip-

      - name: Install Python dependencies
        run: pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Check Python formatting
        run: python -m ruff format --check .

      - name: Run Python lint
        run: python -m ruff check .

      - name: Run Python tests
        run: python -m pytest -q --tb=short

      - name: Run Python type checks
        run: python -m mypy
