repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: .venv/bin/python -m ruff format
        language: system
        types_or: [python, pyi]
      - id: ruff-check
        name: ruff check
        entry: .venv/bin/python -m ruff check --fix
        language: system
        types_or: [python, pyi]

