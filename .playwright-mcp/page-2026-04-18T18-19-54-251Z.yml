          - paragraph [ref=e473]:
            - strong [ref=e475]:
              - text: This material must be preceded or accompanied by a prospectus. Please read the prospectus carefully before investing. To obtain a current prospectus visit
              - link "BITBetf.com/prospectus" [ref=e476] [cursor=pointer]:
