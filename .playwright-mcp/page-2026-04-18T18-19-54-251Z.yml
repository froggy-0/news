          - paragraph [ref=e477]:
            - generic [ref=e478]:
              - text: The Bitwise Bitcoin ETF ("BITB" or the "Fund") is not an investment company registered under the Investment Company Act of 1940 (the “1940 Act”) and is not subject to regulation under the Commodity Exchange Act of 1936 (the “CEA”). As a result, shareholders of BITB do not have the protections associated with ownership of shares in an investment company registered under the 1940 Act or the protections afforded by the CEA.
              - text: Shares of ETFs are bought and sold at market price (not NAV) and are not individually redeemed from the Fund. Brokerage commissions will reduce returns. The NAV may not always correspond to the market price of bitcoin and, as a result, Creation Units may be created or redeemed at a value that is different from the market price of the Shares. Authorized Participants’ buying and selling activity associated with the creation and redemption of Creation Units may adversely affect an investment in the Shares.
              - text: The amount of bitcoin represented by a Share will continue to be reduced during the life of the Fund due to the transfer of the Fund’s bitcoin to pay for the Sponsor’s management fee, and to pay for litigation expenses or other extraordinary expenses. This dynamic will occur irrespective of whether the trading price of the Shares rises or falls in response to changes in the price of bitcoin.
              - text: There is no guarantee or assurance that the Fund’s methodology will result in the Fund achieving positive investment returns or outperforming other investment products.
              - text: Investors may choose to use the Fund as a means of investing indirectly in bitcoin. Because the value of the Shares is correlated with the value of the bitcoin held by the Fund, it is important to understand the investment attributes of, and the market for, bitcoin.
              - text: Bitcoin Risk. There are significant risks and hazards inherent in the bitcoin market that may cause the price of bitcoin to fluctuate widely. The Fund’s bitcoin may be subject to loss, damage, theft or restriction on access. Investors considering a purchase of Shares should carefully consider how much of their total assets should be exposed to the bitcoin market, and should fully understand, be willing to assume, and have the financial resources necessary to withstand the risks involved in the Fund’s investment strategy.
              - text: Liquidity Risk. The market for bitcoin is still developing and may be subject to periods of illiquidity. During such times it may be difficult or impossible to buy or sell a position at the desired price. Possible illiquid markets may exacerbate losses or increase the variability between the Fund’s NAV and its market price. The lack of active trading markets for the Shares may result in losses on investors’ investments at the time of disposition of Shares.
              - text: Regulatory Risk. Future and current regulations by a U.S. or foreign government or quasi-governmental agency could have an adverse effect on an investment in the Fund.
              - text: Blockchain Technology Risk. Certain of the Fund’s investments may be subject to the risks associated with investing in blockchain technology. The risks associated with blockchain technology may not fully emerge until the technology is widely used. Blockchain systems could be vulnerable to fraud, particularly if a significant minority of participants colluded to defraud the rest. Because blockchain technology systems may operate across many national boundaries and regulatory jurisdictions, it is possible that blockchain technology may be subject to widespread and inconsistent regulation.
              - text: Nondiversification Risk. The Fund is nondiversified and may hold a smaller number of portfolio securities than many other products. To the extent the Fund invests in a relatively small number of issuers, a decline in the market value of a particular security held by the Fund may affect its value more than if it invested in a larger number of issuers.
              - text: Recency Risk. The Fund is recently organized, giving prospective investors a limited track record on which to base their investment decision. If the Fund is not profitable, the Fund may terminate and liquidate at a time that is disadvantageous to Shareholders.
              - text: Bitwise Investment Advisers, LLC serves as the sponsor of the Fund. Foreside Fund Services, LLC serves as the Marketing Agent for BITB, and is not affiliated with Bitwise Investment Advisers, LLC, Bitwise, or any of its affiliates.
