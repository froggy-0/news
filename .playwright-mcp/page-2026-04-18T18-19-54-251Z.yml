          - paragraph [ref=e424]:
            - text: Performance data quoted represents past performance and is no guarantee of future results. Short-term performance, in particular, is not a good indication of the fund's future performance, and an investment should not be made based solely on returns. Investment return and principal value of an investment will fluctuate so that an investor's shares, when redeemed, may be worth more or less than the original cost. Current performance may be lower or higher than the original cost. Returns for periods of one year or less are not annualized. For the most recent month-end performance, please call 1-415-707-3663.
            - text: Performance of one year or less is not annualized. NAV performance is calculated based on the official closing values as of 4:00 p.m. ET. Market Price performance reflects the midpoint of the bid-ask spread as of 4:00 p.m. ET, and does not represent the returns an investor would receive if shares were traded at other times. Fund returns are calculated net of expenses. Shares are subject to a 0.20% management fee that includes the custody charges for holding the fund’s assets charged by the custodian, as well as customary fees and expenses of the fund administrator and auditor. For a six-month period commencing on the day the Shares are initially listed on the Exchange, the Sponsor has agreed to waive the entire Sponsor Fee on the first $1 billion of Trust assets.
