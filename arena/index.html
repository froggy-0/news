<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Arena — BTC Spot Paper Trading</title>
  <meta name="description" content="BTC 현물 long/flat 알고리즘 페이퍼트레이딩 아레나 — 실시간 퍼포먼스 대시보드">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root{
      --bg:#0B0E11;
      --surface:#161A1E;
      --panel:#1E2329;
      --panel-h:#252B33;
      --border:#2B3139;
      --border-l:#3D4550;
      --gold:#F0B90B;
      --gold-a:rgba(240,185,11,.1);
      --green:#0ECB81;
      --green-a:rgba(14,203,129,.08);
      --red:#F6465D;
      --red-a:rgba(246,70,93,.08);
      --text:#EAECEF;
      --muted:#848E9C;
      --muted2:#B7BDC6;
    }

    body{
      font-family:'IBM Plex Mono','Apple SD Gothic Neo',monospace;
      background:var(--bg);color:var(--text);
      min-height:100vh;font-size:13px;line-height:1.5;
    }

    /* ── Header ───────────────────────────────────────────── */
    .hd{
      position:sticky;top:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;height:52px;
      background:rgba(11,14,17,.97);
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }
    .hd-brand{display:flex;align-items:center;gap:12px}
    .hd-title{
      font-family:'Barlow Condensed',sans-serif;
      font-size:18px;font-weight:800;letter-spacing:3px;
      color:var(--gold);text-transform:uppercase;white-space:nowrap;
    }
    .hd-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
    .hd-sub{font-size:10px;color:var(--muted);letter-spacing:.5px;white-space:nowrap}
    .hd-center{display:flex;align-items:baseline;gap:8px}
    .btc-price{
      font-size:16px;font-weight:600;letter-spacing:-.3px;
      font-variant-numeric:tabular-nums;
    }
    .btc-chg{font-size:12px;font-weight:500}
    .c-green{color:var(--green)}.c-red{color:var(--red)}.c-gold{color:var(--gold)}.c-muted{color:var(--muted)}
    .hd-right{display:flex;align-items:center;gap:16px}
    .kst-clock{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;letter-spacing:.2px;white-space:nowrap}
    .live-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--green)}
    .live-dot{
      width:7px;height:7px;border-radius:50%;background:var(--green);
      box-shadow:0 0 5px var(--green);animation:pulse 2s ease-in-out infinite;
    }

    /* ── Layout ───────────────────────────────────────────── */
    .wrap{max-width:1480px;margin:0 auto;padding:16px 20px 32px}

    /* ── Portfolio bar ────────────────────────────────────── */
    .port-bar{
      display:grid;grid-template-columns:1fr repeat(3,auto);
      align-items:center;gap:24px;
      padding:12px 18px;
      background:var(--panel);border:1px solid var(--border);
      margin-bottom:12px;
    }
    .port-label{
      font-family:'Barlow Condensed',sans-serif;
      font-size:11px;font-weight:500;letter-spacing:1.5px;
      color:var(--muted);text-transform:uppercase;
    }
    .port-stat{text-align:right}
    .port-stat-lbl{font-size:9px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
    .port-stat-val{font-size:18px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
    .port-stat-sub{font-size:10px;color:var(--muted);margin-top:2px}

    /* ── Algo grid ────────────────────────────────────────── */
    .algo-grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;margin-bottom:12px;
    }
    .ac{
      background:var(--panel);border:1px solid var(--border);
      border-top:2px solid var(--ac);padding:12px 14px;
      transition:background 150ms;cursor:default;
    }
    .ac:hover{background:var(--panel-h)}
    .ac-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:6px}
    .ac-name{
      font-family:'Barlow Condensed',sans-serif;
      font-size:11px;font-weight:700;letter-spacing:1.5px;
      color:var(--ac);text-transform:uppercase;line-height:1.3;
    }
    .pos-badge{
      font-size:8px;font-weight:700;letter-spacing:1px;
      padding:2px 7px;border:1px solid;white-space:nowrap;flex-shrink:0;
    }
    .pos-badge.long{color:var(--green);border-color:rgba(14,203,129,.4);background:var(--green-a)}
    .pos-badge.flat{color:var(--muted);border-color:var(--border)}
    .ac-equity{
      font-size:15px;font-weight:600;line-height:1;margin-bottom:3px;
      font-variant-numeric:tabular-nums;
    }
    .ac-ret{font-size:11px;margin-bottom:8px}
    .ac-metrics{display:flex;flex-direction:column;gap:2px}
    .ac-metric{
      display:flex;justify-content:space-between;gap:4px;
      font-size:9px;color:var(--muted);
    }
    .ac-metric-val{color:var(--muted2);text-align:right}
    .ac-hint{font-size:8px;color:var(--muted);margin-top:3px;line-height:1.4;opacity:.8}

    /* ── Chart panel ──────────────────────────────────────── */
    .chart-panel{
      background:var(--panel);border:1px solid var(--border);
      margin-bottom:12px;
    }
    .chart-head{
      display:flex;justify-content:space-between;align-items:center;
      padding:12px 18px 10px;border-bottom:1px solid var(--border);
    }
    .panel-title{
      font-family:'Barlow Condensed',sans-serif;
      font-size:11px;font-weight:700;letter-spacing:2px;
      color:var(--muted2);text-transform:uppercase;
    }
    .trade-count-lbl{font-size:10px;color:var(--muted)}

    .tabs{
      display:flex;flex-wrap:nowrap;overflow-x:auto;gap:4px;
      padding:10px 18px 0;scrollbar-width:none;
    }
    .tabs::-webkit-scrollbar{display:none}
    .tab{
      font-family:'Barlow Condensed',sans-serif;
      font-size:11px;font-weight:700;letter-spacing:1px;
      text-transform:uppercase;padding:5px 13px;
      background:transparent;border:1px solid var(--border);
      color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;
      transition:color 120ms,border-color 120ms,background 120ms;
    }
    .tab:hover{color:var(--muted2);border-color:var(--border-l)}
    .tab.active{
      color:var(--ac);border-color:var(--ac);
      background:color-mix(in srgb,var(--ac) 10%,transparent);
    }

    .chart-container{position:relative;height:420px;padding:10px 0 0}
    #lwChartEl{height:100%;width:100%}

    .chart-legend{
      display:flex;gap:20px;flex-wrap:wrap;
      padding:10px 18px 12px;font-size:10px;color:var(--muted);
    }
    .chart-legend span{color:var(--muted2)}

    /* ── Position strip ───────────────────────────────────── */
    .pos-strip{
      padding:10px 18px;border-top:1px solid var(--border);
      display:flex;flex-wrap:wrap;gap:10px;min-height:50px;align-items:center;
    }
    .pos-flat-msg{font-size:11px;color:var(--muted);padding:4px 0}
    .pos-card{
      flex:1 1 220px;min-width:200px;
      border:1px solid var(--border);border-left:3px solid var(--pc);
      background:var(--green-a);padding:10px 12px;
    }
    .pos-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
    .pos-card-left{display:flex;align-items:center;gap:8px}
    .pos-dir-badge{
      font-size:9px;font-weight:700;letter-spacing:.5px;
      color:var(--pc);padding:2px 6px;border:1px solid var(--pc40);
    }
    .pos-algo-name{
      font-family:'Barlow Condensed',sans-serif;
      font-size:12px;font-weight:600;letter-spacing:.5px;color:var(--muted2);
    }
    .pos-unrl{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums}
    .pos-meta{font-size:10px;color:var(--muted2);line-height:1.7}

    /* ── Log panel ────────────────────────────────────────── */
    .log-panel{background:var(--panel);border:1px solid var(--border)}
    .log-head{
      display:flex;justify-content:space-between;align-items:center;
      padding:12px 18px;border-bottom:1px solid var(--border);
    }
    .tlog-scroll{max-height:380px;overflow-y:auto;overflow-x:auto}
    .tlog-scroll::-webkit-scrollbar{width:3px;height:3px}
    .tlog-scroll::-webkit-scrollbar-track{background:transparent}
    .tlog-scroll::-webkit-scrollbar-thumb{background:var(--border-l)}

    .tbl{width:100%;border-collapse:collapse;min-width:560px}
    .tbl th{
      font-size:9px;letter-spacing:1px;font-weight:400;color:var(--muted);
      text-transform:uppercase;padding:10px 14px 10px 0;text-align:left;
      border-bottom:1px solid var(--border);
    }
    .tbl th:first-child{padding-left:18px}
    .tbl td{
      padding:9px 14px 9px 0;
      border-bottom:1px solid rgba(255,255,255,.03);
      vertical-align:middle;font-size:12px;
      font-variant-numeric:tabular-nums;
    }
    .tbl td:first-child{padding-left:18px}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:rgba(255,255,255,.02)}
    .tbl tr.open-row td{background:rgba(240,185,11,.04)}
    .tbl tr.open-row td:first-child{box-shadow:inset 2px 0 0 var(--gold)}

    .algo-chip{
      font-size:9px;font-weight:600;letter-spacing:.4px;
      padding:2px 6px;border:1px solid;white-space:nowrap;
    }
    .buy-chip{
      font-size:9px;font-weight:700;letter-spacing:.5px;
      color:var(--green);padding:2px 6px;
      border:1px solid rgba(14,203,129,.35);
    }
    .ret-pos{color:var(--green);font-weight:600}
    .ret-neg{color:var(--red);font-weight:600}
    .ret-open{color:var(--muted)}
    .open-tag{
      font-size:8px;color:var(--gold);background:var(--gold-a);
      padding:1px 5px;margin-left:5px;letter-spacing:.5px;
    }
    .sl-tag{
      font-size:8px;color:var(--red);background:var(--red-a);
      padding:1px 4px;margin-left:4px;
    }

    /* ── Footer ───────────────────────────────────────────── */
    .ft{
      text-align:center;padding:16px 20px;
      font-size:10px;color:var(--muted);
      border-top:1px solid var(--border);letter-spacing:.3px;
    }

    /* ── Skeleton ─────────────────────────────────────────── */
    .sk{
      background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);
      background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:1px;
    }

    /* ── Animations ───────────────────────────────────────── */
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.75)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

    /* ── Responsive ───────────────────────────────────────── */
    @media(max-width:1080px){.algo-grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:640px){
      .algo-grid{grid-template-columns:repeat(2,1fr)}
      .chart-container{height:280px}
      .port-bar{grid-template-columns:1fr 1fr;gap:12px}
      .port-label{grid-column:1/-1;margin-bottom:4px}
      .port-stat{text-align:left}
    }
    @media(max-width:480px){
      .wrap{padding:10px 12px 24px}
      .hd{padding:0 12px}
      .hd-sub,.hd-sep{display:none}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
    }
  </style>
</head>
<body>

<header class="hd" role="banner">
  <div class="hd-brand">
    <span class="hd-title">SOVEREIGN ARENA</span>

    <div class="ac" style="--ac:#2B3139"><div class="ac-head"><div class="sk" style="height:11px;width:70%;margin-bottom:0"></div></div><div class="sk" style="height:15px;width:50%;margin-bottom:6px"></div><div class="sk" style="height:11px;width:35%;margin-bottom:10px"></div><div class="sk" style="height:9px;width:80%;margin-bottom:4px"></div><div class="sk" style="height:9px;width:60%"></div></div>
    <div class="ac" style="--ac:#2B3139"><div class="ac-head"><div class="sk" style="height:11px;width:70%;margin-bottom:0"></div></div><div class="sk" style="height:15px;width:50%;margin-bottom:6px"></div><div class="sk" style="height:11px;width:35%;margin-bottom:10px"></div><div class="sk" style="height:9px;width:80%;margin-bottom:4px"></div><div class="sk" style="height:9px;width:60%"></div></div>

  <div class="chart-panel">

      <div id="lwChartEl" role="img" aria-label="BTC 4H 캔들차트 — 알고리즘 진입·청산 마커 포함"></div>

  <div class="log-panel">
    <div class="log-head">
      <span class="panel-title">TRADE LOG</span>

    <div class="tlog-scroll" role="region" aria-label="거래 기록">
      <table class="tbl" role="table" aria-label="거래 목록">

</main>

/* ── Helpers ───────────────────────────────────────────────── */
function fmtKST(isoOrMs) {
  const d = typeof isoOrMs === 'number' ? new Date(isoOrMs) : new Date(isoOrMs);
  return d.toLocaleString('ko-KR', {
    month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit',
    hour12: false, timeZone: 'Asia/Seoul',
  });
}
function fmtKSTFull(ms) {
  return new Date(ms).toLocaleString('ko-KR', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit',
    hour12: false, timeZone: 'Asia/Seoul',
  });
}

function snapToBar(epochSec) {
  if (!ohlcv.length) return epochSec;
  let closest = ohlcv[0].time, minDist = Math.abs(ohlcv[0].time - epochSec);
  for (const bar of ohlcv) {
    const d = Math.abs(bar.time - epochSec);
    if (d < minDist) { minDist = d; closest = bar.time; }
  }
  return closest;
}

function calcUptimeHours(ps, algoId) {
  let h = 0;
  for (const p of ps) {
    if (p.algo_id !== algoId) continue;
    if (p.status === 'closed') h += p.hold_hours || 0;
    else if (p.status === 'open') h += (Date.now() - new Date(p.open_time).getTime()) / 3_600_000;
  }
  return h;
}

/* ── Algo stats ─────────────────────────────────────────────── */
function algoStats(ps) {
  const out = {};
  for (const algo of ALGO_IDS) {
    const all  = ps.filter(p => p.algo_id === algo);
    const done = [...all.filter(p => p.status === 'closed' && p.ret_pct != null)]
      .sort((a, b) => new Date(a.close_time) - new Date(b.close_time));
    const open = all.find(p => p.status === 'open');
    const wins = done.filter(p => p.hit).length;

    // 변동성 타깃 가중치 반영: equity = Π(1 + weight × ret_pct)
    let equity = STARTING_CAPITAL;
    for (const p of done) {
      const w = p.position_weight != null ? p.position_weight : 1;
      equity *= (1 + w * (p.ret_pct || 0));
    }

    let unrealizedPct = null, equityTotal = equity, openWeight = null;
    if (open && latestBtcPrice && open.open_price) {
      const w = open.position_weight != null ? open.position_weight : 1;
      openWeight = w;
      const raw = (latestBtcPrice - open.open_price) / open.open_price;
      unrealizedPct = raw * 100;          // 원시 가격 변동(직관적 표시)
      equityTotal = equity * (1 + w * raw); // 가중 자산
    }

    // 수익률 = 가중 자산 기준 (표시 자산과 일치)
    const totalRet = (equity / STARTING_CAPITAL - 1) * 100;
    const uptimeH  = calcUptimeHours(ps, algo);

    out[algo] = {
      totalRet:      parseFloat(totalRet.toFixed(2)),
      winRate:       done.length ? parseFloat((wins / done.length * 100).toFixed(1)) : null,
      closedN:       done.length,
      pos:           open ? open.direction.toUpperCase() : 'FLAT',
      openEntry:     open ? open.open_price : null,
      openWeight:    openWeight,
      unrealizedPct: unrealizedPct != null ? parseFloat(unrealizedPct.toFixed(2)) : null,
      hasAnyTrade:   all.length > 0,
      equity:        parseFloat(equity.toFixed(2)),
      equityTotal:   parseFloat(equityTotal.toFixed(2)),
      pnl:           parseFloat((equityTotal - STARTING_CAPITAL).toFixed(2)),
      uptimeH:       parseFloat(uptimeH.toFixed(1)),
    };
  }
  return out;
}

function signalHint(algo, dec) {
  if (dec) {
    const inp = (dec.reason && dec.reason.inputs) || {};
    if (dec.action === 'hold') return null;
    switch (algo) {
      case 'regime_trend':    if (inp.regime_state != null) return `레짐 ${inp.regime_state}${inp.adx != null ? ` · ADX ${inp.adx.toFixed(0)}` : ''}`; break;
      case 'fng_contrarian':  if (inp.fng != null) return `FNG ${inp.fng}`; break;
      case 'vix_rsi':         if (inp.vix_now != null) return `VIX ${inp.vix_now.toFixed(1)}`; break;
      case 'macd_momentum':   if (inp.macd_hist != null) return `MACD ${inp.macd_hist.toFixed(0)}${inp.adx != null ? ` · ADX ${inp.adx.toFixed(0)}` : ''}`; break;
      case 'multi_factor':    if (inp.fng != null) return `FNG ${inp.fng} · VIX ${inp.vix_now != null ? inp.vix_now.toFixed(1) : '—'}${inp.etf_flow_zscore != null ? ` · ETF z${inp.etf_flow_zscore >= 0 ? '+' : ''}${inp.etf_flow_zscore.toFixed(1)}` : ''}`; break;
    }
  }
  return ALGO_NEEDS[algo] || null;
}

/* ── Render: algo cards ─────────────────────────────────────── */
function renderCards(stats) {
  document.getElementById('algoGrid').innerHTML = ALGO_IDS.map(algo => {
    const s   = stats[algo];
    const cfg = ALGOS[algo];
    const dec = latestDecisions[algo];

    const isLong   = s.pos === 'LONG';
    const posBadge = `<span class="pos-badge ${isLong ? 'long' : 'flat'}">${s.pos}</span>`;

    const eqColor = s.pnl >= 0 ? 'var(--green)' : 'var(--red)';
    const eqSign  = s.pnl >= 0 ? '+' : '-';
    const eqVal   = s.hasAnyTrade ? `$${s.equityTotal.toFixed(0)}` : '$1,000';
    const eqSub   = s.hasAnyTrade
      ? ` <span style="font-size:10px;opacity:.65;color:${eqColor}">(${eqSign}$${Math.abs(s.pnl).toFixed(2)})</span>`
      : '';

    let retTxt, retColor;
    if (!s.hasAnyTrade) {
      retTxt = '신호 대기'; retColor = 'var(--muted)';
    } else if (s.closedN === 0 && s.unrealizedPct != null) {
      const sign = s.unrealizedPct >= 0 ? '+' : '';
      retTxt = `${sign}${s.unrealizedPct.toFixed(2)}% <span style="font-size:9px;opacity:.6">미실현</span>`;
      retColor = s.unrealizedPct >= 0 ? 'var(--green)' : 'var(--red)';
    } else {
      const sign = s.totalRet >= 0 ? '+' : '';
      retTxt = `${sign}${s.totalRet.toFixed(2)}%`;
      retColor = s.totalRet >= 0 ? 'var(--green)' : 'var(--red)';
    }

    const uptimeTxt = s.uptimeH > 0 ? `${s.uptimeH.toFixed(0)}h` : '—';
    const wrTxt     = s.closedN > 0 ? `${s.winRate.toFixed(0)}% (${s.closedN}건)` : '—';
    const hint      = s.pos === 'FLAT' ? signalHint(algo, dec) : null;

    return `<div class="ac" style="--ac:${cfg.color}" role="article" aria-label="${algo}">
      <div class="ac-head">
        <span class="ac-name">${algo.replace(/_/g, ' ')}</span>
        ${posBadge}
      </div>
      <div class="ac-equity" style="color:${s.hasAnyTrade ? eqColor : 'var(--muted2)'}">
        ${eqVal}${eqSub}
      </div>
      <div class="ac-ret" style="color:${retColor}">${retTxt}</div>
      <div class="ac-metrics">
        <div class="ac-metric"><span>총 진입 시간</span><span class="ac-metric-val">${uptimeTxt}</span></div>
        <div class="ac-metric"><span>승률</span><span class="ac-metric-val">${wrTxt}</span></div>
        ${s.openEntry ? `<div class="ac-metric"><span>현재 진입가</span><span class="ac-metric-val">$${s.openEntry.toLocaleString()}</span></div>` : ''}
        ${s.openWeight != null ? `<div class="ac-metric"><span>노출 (변동성)</span><span class="ac-metric-val">${s.openWeight.toFixed(2)}x</span></div>` : ''}
        ${hint ? `<div class="ac-hint">${hint}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ── Render: portfolio bar ──────────────────────────────────── */
function renderPortfolio(stats) {
  const totalStart = ALGO_IDS.length * STARTING_CAPITAL;
  let totalEquity = 0, realizedEquity = 0, openCount = 0;
  for (const algo of ALGO_IDS) {
    const s = stats[algo];
    totalEquity    += s.equityTotal;
    realizedEquity += s.equity;
    if (s.pos !== 'FLAT') openCount++;
  }
  const totalPnl = totalEquity - totalStart;
  const totalPct = (totalPnl / totalStart) * 100;
  const realPnl  = realizedEquity - totalStart;

  const pnlColor  = totalPnl >= 0 ? 'var(--green)' : 'var(--red)';
  const realColor = realPnl  >= 0 ? 'var(--green)' : 'var(--red)';
  const fmt = v => (v >= 0 ? '+' : '') + v.toFixed(2);

  document.getElementById('portTotal').innerHTML =
    `<span style="color:${pnlColor}">$${totalEquity.toFixed(0)}</span>`;
  document.getElementById('portTotalPct').innerHTML =
    `<span style="color:${pnlColor}">${fmt(totalPct)}%</span>`;
  document.getElementById('portRealized').innerHTML =
    `<span style="color:${realColor}">${realPnl >= 0 ? '+$' : '-$'}${Math.abs(realPnl).toFixed(0)}</span>`;
  document.getElementById('portOpen').textContent  = openCount;
  document.getElementById('portOpenSub').textContent = `/ ${ALGO_IDS.length}개 진입 중`;
}

/* ── Render: tabs ───────────────────────────────────────────── */
function renderTabs() {
  const el = document.getElementById('algoTabs');
  if (!el) return;
  el.innerHTML = TAB_DEFS.map(t =>
    `<button class="tab${activeTab === t.id ? ' active' : ''}" style="--ac:${t.color}" data-tab="${t.id}" role="tab" aria-selected="${activeTab === t.id}">${t.label}</button>`
  ).join('');
  el.querySelectorAll('.tab').forEach(b => {
    b.addEventListener('click', () => {
      if (activeTab === b.dataset.tab) return;
      activeTab = b.dataset.tab;
      renderTabs();
      renderPositionStrip();
      renderPriceChart();
      renderLog(positions);
    });
  });
}

/* ── Render: position strip ─────────────────────────────────── */
function renderPositionStrip() {
  const el = document.getElementById('posStrip');
  if (!el) return;
  const opens = positions.filter(p =>
    p.status === 'open' && (activeTab === 'all' || p.algo_id === activeTab));
  if (!opens.length) {
    el.innerHTML = `<span class="pos-flat-msg">${activeTab === 'all' ? '현재 진입 중인 포지션 없음' : '현재 FLAT'}</span>`;
    return;
  }
  const now = Date.now();
  el.innerHTML = opens
    .sort((a, b) => new Date(a.open_time) - new Date(b.open_time))
    .map(p => {
      const color = (ALGOS[p.algo_id] || {}).color || '#34D399';
      const w = p.position_weight != null ? p.position_weight : 1;
      let unrlStr = '—', unrlColor = 'var(--muted)', pnlStr = '';
      if (latestBtcPrice && p.open_price) {
        const raw = (latestBtcPrice - p.open_price) / p.open_price;
        const u = raw * 100;
        unrlColor = u >= 0 ? 'var(--green)' : 'var(--red)';
        unrlStr   = `${u >= 0 ? '+' : ''}${u.toFixed(2)}%`;
        pnlStr    = ` · ${raw >= 0 ? '+' : '-'}$${Math.abs(w * raw * STARTING_CAPITAL).toFixed(0)}`;
      }
      const holdH = (now - new Date(p.open_time).getTime()) / 3_600_000;
      const cur   = latestBtcPrice ? `$${Math.round(latestBtcPrice).toLocaleString()}` : '—';
      const wStr  = ` · 노출 ${w.toFixed(2)}x`;
      let slStr = '';
      if (p.stop_loss_price && p.open_price) {
        const slPct = Math.abs(p.open_price - p.stop_loss_price) / p.open_price * 100;
        slStr = ` · 손절 $${Math.round(p.stop_loss_price).toLocaleString()} (−${slPct.toFixed(1)}%)`;
      }
      return `<div class="pos-card" style="--pc:${color};--pc40:${color}40;border-left-color:${color}">
        <div class="pos-card-top">
          <div class="pos-card-left">
            <span class="pos-dir-badge">▲ SPOT LONG</span>
            ${activeTab === 'all' ? `<span class="pos-algo-name">${p.algo_id}</span>` : ''}
          </div>
          <span class="pos-unrl" style="color:${unrlColor}">${unrlStr}</span>
        </div>
        <div class="pos-meta">진입 $${Math.round(p.open_price).toLocaleString()} → ${cur}${pnlStr}${wStr}</div>
        <div class="pos-meta">보유 ${holdH.toFixed(1)}h · 진입 ${fmtKST(p.open_time)} KST${slStr}</div>
      </div>`;
    }).join('');
}

/* ── Lightweight-charts init ────────────────────────────────── */
function initChart() {
  const container = document.getElementById('lwChartEl');
  if (!container || typeof LightweightCharts === 'undefined') return;
  if (lwChart) { lwChart.remove(); lwChart = null; candleSeries = null; priceLinesOpen = []; }

  lwChart = LightweightCharts.createChart(container, {
    width:  container.clientWidth,
    height: container.clientHeight || 420,
    layout: {
      background: { type: 'solid', color: '#0B0E11' },
      textColor:  '#848E9C',
      fontFamily: "'IBM Plex Mono', monospace",
      fontSize:   10,
    },
    grid: {
      vertLines: { color: '#1A1F27' },
      horzLines: { color: '#1A1F27' },
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: '#3D4550', labelBackgroundColor: '#252B33' },
      horzLine: { color: '#3D4550', labelBackgroundColor: '#252B33' },
    },
    rightPriceScale: { borderColor: '#2B3139' },
    timeScale: {
      borderColor:     '#2B3139',
      timeVisible:     true,
      secondsVisible:  false,
      tickMarkFormatter: (time) => {
        const d = new Date(time * 1000);
        return d.toLocaleString('ko-KR', {
          month: '2-digit', day: '2-digit',
          hour: '2-digit', hour12: false, timeZone: 'Asia/Seoul',
        });
      },
    },
    localization: {
      timeFormatter: (time) => fmtKSTFull(time * 1000) + ' KST',
      priceFormatter: (price) => '$' + price.toLocaleString('en-US', { maximumFractionDigits: 0 }),
    },
  });

  candleSeries = lwChart.addCandlestickSeries({
    upColor:      '#0ECB81',
    downColor:    '#F6465D',
    borderVisible: false,
    wickUpColor:   '#0ECB81',
    wickDownColor: '#F6465D',
  });

  const ro = new ResizeObserver(entries => {
    if (!lwChart || !entries[0]) return;
    const { width, height } = entries[0].contentRect;
    lwChart.applyOptions({ width, height });
  });
  ro.observe(container);
}

/* ── Render: price chart ────────────────────────────────────── */
function clearPriceLines() {
  for (const pl of priceLinesOpen) {
    try { if (candleSeries) candleSeries.removePriceLine(pl); } catch(_) {}
  }
  priceLinesOpen = [];
}

const ALGO_ABBR = {
  regime_trend: 'REG', fng_contrarian: 'FNG',
  vix_rsi: 'VIX', macd_momentum: 'MAC', multi_factor: 'MLT',
};

function renderPriceChart() {
  if (!lwChart || !candleSeries) return;
  if (!ohlcv.length) return;

  candleSeries.setData(ohlcv);
  clearPriceLines();

  const trades = positions.filter(p =>
    p.direction === 'long' && (activeTab === 'all' || p.algo_id === activeTab));

  const markers = [];
  for (const p of trades) {
    const color = (ALGOS[p.algo_id] || {}).color || '#848E9C';
    const abbr  = ALGO_ABBR[p.algo_id] || '?';

    if (p.open_price) {
      const ot = snapToBar(Math.floor(new Date(p.open_time).getTime() / 1000));
      markers.push({
        time: ot, position: 'belowBar', color,
        shape: 'arrowUp', text: abbr, size: 1.2,
      });
    }
    if (p.status === 'closed' && p.close_time) {
      const ct  = snapToBar(Math.floor(new Date(p.close_time).getTime() / 1000));
      const win = p.ret_pct != null && p.ret_pct >= 0;
      markers.push({
        time: ct, position: 'aboveBar',
        color: win ? '#0ECB81' : '#F6465D',
        shape: 'circle', size: 0.8,
      });
    }
  }

  markers.sort((a, b) => a.time - b.time);
  candleSeries.setMarkers(markers);

  if (activeTab !== 'all') {
    const op = trades.find(p => p.status === 'open');
    if (op && op.open_price) {
      const color = (ALGOS[activeTab] || {}).color || '#848E9C';
      priceLinesOpen.push(candleSeries.createPriceLine({
        price: op.open_price, color, lineWidth: 1, lineStyle: 1,
        axisLabelVisible: true, title: '진입가',
      }));
      if (op.stop_loss_price) {
        priceLinesOpen.push(candleSeries.createPriceLine({
          price: op.stop_loss_price, color: '#F6465D',
          lineWidth: 1, lineStyle: 3, axisLabelVisible: true, title: '손절',
        }));
      }
    }
  }

  if (markers.length) {
    const times = markers.map(m => m.time);
    const minT  = Math.min(...times);
    const maxT  = Math.max(...times);
    const lastT = ohlcv[ohlcv.length - 1].time;
    const pad   = Math.max((maxT - minT) * 0.1, 24 * 3600);
    try {
      lwChart.timeScale().setVisibleRange({ from: minT - pad, to: Math.max(maxT, lastT) + pad });
    } catch(_) {}
  } else {
    const lastT = ohlcv[ohlcv.length - 1].time;
    try {
      lwChart.timeScale().setVisibleRange({ from: lastT - 14 * 24 * 3600, to: lastT + 3600 });
    } catch(_) {}
  }

  const openN  = trades.filter(p => p.status === 'open').length;
  const prefix = activeTab === 'all' ? '전체' : activeTab;
  document.getElementById('tradeCountLabel').textContent =
    `${prefix} ${trades.length}건 · 진입 ${openN}건`;
}

/* ── Render: trade log ──────────────────────────────────────── */
function renderLog(ps) {
  const view   = activeTab === 'all' ? ps : ps.filter(p => p.algo_id === activeTab);
  const sorted = [...view].sort((a, b) => new Date(b.open_time) - new Date(a.open_time));
  const openN  = view.filter(p => p.status === 'open').length;
  const prefix = activeTab === 'all' ? '전체' : activeTab;
  document.getElementById('tradeCountLabel').textContent =
    `${prefix} ${view.length}건 · 진입 ${openN}건`;

  const body = document.getElementById('tradeLogBody');
  if (!sorted.length) {
    body.innerHTML = `<tr><td colspan="7" style="color:var(--muted);font-size:11px;padding:20px 18px">거래 없음</td></tr>`;
    return;
  }

  body.innerHTML = sorted.map(p => {
    const cfg = ALGOS[p.algo_id] || { color: '#848E9C' };
    const ts  = fmtKST(p.open_time);

    let retHtml;
    if (p.status === 'open') {
      if (latestBtcPrice && p.open_price) {
        const u = (latestBtcPrice - p.open_price) / p.open_price * 100;
        retHtml = `<span class="${u >= 0 ? 'ret-pos' : 'ret-neg'}">${u >= 0 ? '+' : ''}${u.toFixed(2)}%<span class="open-tag">진입중</span></span>`;
      } else {
        retHtml = '<span class="ret-open">진입 중</span>';
      }
    } else if (p.ret_pct != null) {
      const pct  = (p.ret_pct * 100).toFixed(2);
      const sign = p.ret_pct >= 0 ? '+' : '';
      const sl   = p.is_stop_loss ? '<span class="sl-tag">SL</span>' : '';
      retHtml = `<span class="${p.ret_pct >= 0 ? 'ret-pos' : 'ret-neg'}">${sign}${pct}%${sl}</span>`;
    } else {
      retHtml = '<span class="ret-open">—</span>';
    }

    const exitTd = p.close_price
      ? `$${p.close_price.toLocaleString()}`
      : `<span style="color:var(--muted)">—</span>`;
    const holdTd = p.hold_hours != null
      ? `${Math.round(p.hold_hours)}h`
      : `<span style="color:var(--muted)">—</span>`;

    return `<tr class="${p.status === 'open' ? 'open-row' : ''}">
      <td style="color:var(--muted)">${ts}</td>
      <td><span class="algo-chip" style="color:${cfg.color};border-color:${cfg.color}40">${p.algo_id}</span></td>
      <td><span class="buy-chip">▲ SPOT LONG</span></td>
      <td>$${p.open_price.toLocaleString()}</td>
      <td style="color:var(--muted2)">${exitTd}</td>
      <td>${retHtml}</td>
      <td style="color:var(--muted)">${holdTd}</td>
    </tr>`;
  }).join('');
}

/* ── Full render pipeline ───────────────────────────────────── */
function renderAll(ps) {
  positions = ps;
  const stats = algoStats(ps);
  renderPortfolio(stats);
  renderCards(stats);
  renderTabs();
  renderPositionStrip();
  renderPriceChart();
  renderLog(ps);

  const verEl = document.getElementById('stratVer');
  if (verEl) {
    const v = ps.find(p => p.strategy_version)?.strategy_version;
    if (v) verEl.textContent = v;
  }
  const el = document.getElementById('lastUpdate');
  if (el) el.textContent = new Date().toLocaleTimeString('ko-KR', { timeZone: 'Asia/Seoul' }) + ' KST 업데이트';
}

/* ── BTC price ticker ───────────────────────────────────────── */
async function fetchBtcPrice() {
  try {
    const r = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
    if (!r.ok) return;
    const d   = await r.json();
    const price = parseFloat(d.lastPrice);
    latestBtcPrice = price;
    const chg = parseFloat(d.priceChangePercent);
    document.getElementById('btcPrice').textContent =
      '$' + price.toLocaleString('en-US', { maximumFractionDigits: 0 });
    const cel = document.getElementById('btcChg');
    cel.textContent = `${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%`;
    cel.className   = 'btc-chg ' + (chg >= 0 ? 'c-green' : 'c-red');
    if (positions.length) {
      const stats = algoStats(positions);
      renderPortfolio(stats);
      renderCards(stats);
      renderPositionStrip();
    }
  } catch(_) {}
}

/* ── Binance OHLC klines ────────────────────────────────────── */
async function fetchKlines() {
  try {
    const r = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=4h&limit=300');
    if (!r.ok) return;
    const d = await r.json();
    ohlcv = d.map(k => ({
      time:  Math.floor(k[0] / 1000),
      open:  parseFloat(k[1]),
      high:  parseFloat(k[2]),
      low:   parseFloat(k[3]),
      close: parseFloat(k[4]),
    }));
    renderPriceChart();
  } catch(_) {}
}

/* ── Supabase ───────────────────────────────────────────────── */
async function fetchDecisions(client) {
  try {
    const { data } = await client
      .from('arena_decisions')
      .select('algo_id, action, reason, created_at')
      .order('created_at', { ascending: false })
      .limit(25);
    if (!data) return {};
    const out = {};
    for (const d of data) if (!out[d.algo_id]) out[d.algo_id] = d;
    return out;
  } catch(_) { return {}; }
}

async function fetchPositions(client) {
  const { data, error } = await client
    .from('arena_spot_position_mart_v1')
    .select(`
      id, algo_id, direction, status,
      open_time, close_time,
      open_price, close_price, stop_loss_price, position_weight,
      ret_pct, hit, hold_hours,
      is_stop_loss, strategy_version, product_type, position_semantics
    `)
    .order('open_time', { ascending: false })
    .limit(500);
  if (error) { console.error('[Arena] fetch error:', error.message); return null; }
  return (data || []).filter(p =>
    p.direction === 'long' &&
    p.product_type === 'spot' &&
    p.position_semantics === 'spot_long_flat');
}

function renderConnectionError() {
  document.getElementById('algoGrid').innerHTML =
    `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--red);font-size:13px">
      Supabase 연결 실패 — 데이터를 불러올 수 없습니다
    </div>`;
  document.getElementById('tradeLogBody').innerHTML =
    `<tr><td colspan="7" style="color:var(--red);padding:20px 18px">연결 실패</td></tr>`;
}

function setupRealtime(client) {
  client
    .channel('paper_positions_live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'paper_positions' }, async () => {
      const fresh = await fetchPositions(client);
      if (fresh) renderAll(fresh);
    })
    .subscribe(status => {
      const dot = document.getElementById('liveDot');
      if (!dot) return;
      const ok = status === 'SUBSCRIBED';
      dot.style.background  = ok ? '#0ECB81' : '#F0B90B';
      dot.style.boxShadow   = ok ? '0 0 5px #0ECB81' : '0 0 5px #F0B90B';
    });
}

/* ── KST clock ──────────────────────────────────────────────── */
function updateClock() {
  const el = document.getElementById('kstClock');
  if (el) el.textContent = new Date().toLocaleTimeString('ko-KR', {
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false, timeZone: 'Asia/Seoul',
  }) + ' KST';
}

/* ── Init ───────────────────────────────────────────────────── */
async function init() {
  initChart();
  updateClock();
  setInterval(updateClock, 1000);

  fetchBtcPrice();
  setInterval(fetchBtcPrice, 60_000);
  fetchKlines();
  setInterval(fetchKlines, 300_000);
  renderTabs();

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const [data, decisions] = await Promise.all([
    fetchPositions(client),
    fetchDecisions(client),
  ]);
  latestDecisions = decisions;
  if (data) {
    renderAll(data);
    setupRealtime(client);
  } else {
    renderConnectionError();
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
