<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Arena — BTC Paper Trading</title>
  <meta name="description" content="BTC algorithmic paper trading arena — live performance dashboard">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root{
      --bg:#0F172A;
      --surface:rgba(255,255,255,.04);
      --surface-h:rgba(255,255,255,.07);
      --border:rgba(255,255,255,.08);
      --border-s:rgba(255,255,255,.14);
      --text:#F1F5F9;
      --muted:#64748B;
      --muted2:#94A3B8;
      --pos:#34D399;
      --neg:#F87171;
      --amber:#F59E0B;
    }

    body{
      font-family:'Exo 2','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
    }

    body::before{
      content:'';
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
      background-size:44px 44px;
    }

    /* ── Header ─────────────────────────────── */
    .hd{
      position:sticky;top:0;z-index:50;
      background:rgba(15,23,42,.88);
      -webkit-backdrop-filter:blur(16px);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:13px 24px;
      display:flex;align-items:center;justify-content:space-between;
    }

    .hd-brand{display:flex;align-items:baseline;gap:12px}
    .hd-title{
      font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      font-size:14px;font-weight:700;letter-spacing:2.5px;color:var(--amber);
    }
    .hd-sub{font-size:11px;color:var(--muted);letter-spacing:.4px}

    .hd-right{display:flex;align-items:center;gap:20px}
    .btc-wrap{display:flex;align-items:baseline;gap:7px}
    .btc-price{
      font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      font-size:13px;font-weight:600;color:var(--text);
    }
    .btc-chg{font-size:11px;font-weight:500}
    .pos-c{color:var(--pos)}.neg-c{color:var(--neg)}

    .live-badge{
      display:flex;align-items:center;gap:6px;
      font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;font-size:9px;
      letter-spacing:1.5px;color:var(--pos);
    }
    .live-dot{
      width:6px;height:6px;border-radius:50%;background:var(--pos);
      animation:pulse 2s ease-in-out infinite;
    }

    /* ── Main ───────────────────────────────── */
    .wrap{
      position:relative;z-index:1;
      max-width:1440px;margin:0 auto;padding:24px;
    }

    /* ── Algo cards ─────────────────────────── */
    .algo-grid{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:10px;margin-bottom:18px;
    }
    @media(max-width:900px){.algo-grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:560px){.algo-grid{grid-template-columns:repeat(2,1fr)}.wrap{padding:12px}}

    .ac{
      background:var(--surface);
      border:1px solid var(--border);
      border-top:2px solid var(--ac);
      padding:14px 16px;
      transition:background 180ms,border-color 180ms;
      cursor:default;
    }
    .ac:hover{background:var(--surface-h);border-color:var(--border-s)}

    .ac-name{
      font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      font-size:8px;letter-spacing:1.2px;
      color:var(--ac);margin-bottom:7px;text-transform:uppercase;
    }
    .ac-ret{
      font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      font-size:21px;font-weight:700;line-height:1;margin-bottom:9px;
    }
    .ac-bottom{display:flex;justify-content:space-between;align-items:flex-end}
    .ac-stats{font-size:10px;color:var(--muted);line-height:1.7}
    .ac-entry{font-size:9px;color:var(--ac)}

    .pb{
      font-size:9px;font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;letter-spacing:.5px;
      padding:3px 7px;border:1px solid currentColor;
    }
    .pb-long{color:#60A5FA}.pb-short{color:#F87171}.pb-flat{color:var(--muted)}

    /* ── Panel ──────────────────────────────── */
    .panel{
      background:var(--surface);
      border:1px solid var(--border);
      padding:20px;margin-bottom:14px;
    }
    .ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .ptitle{
      font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      font-size:9px;letter-spacing:2px;
      color:var(--muted2);text-transform:uppercase;
    }
    .pmeta{font-size:11px;color:var(--muted)}

    /* ── Chart legend ───────────────────────── */
    .legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px}
    .li{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted2)}
    .ll{width:18px;height:2px;flex-shrink:0;display:inline-block}

    /* ── Trade log ──────────────────────────── */
    .tlog-scroll{max-height:420px;overflow-y:auto}
    .tlog-scroll::-webkit-scrollbar{width:3px}
    .tlog-scroll::-webkit-scrollbar-track{background:transparent}
    .tlog-scroll::-webkit-scrollbar-thumb{background:var(--border-s)}

    .tbl{width:100%;border-collapse:collapse;font-size:12px}
    .tbl th{
      font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;font-size:8px;
      letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;font-weight:400;
      padding:0 10px 10px 0;text-align:left;
      border-bottom:1px solid var(--border);
    }
    .tbl td{
      padding:9px 10px 9px 0;
      border-bottom:1px solid rgba(255,255,255,.04);
      vertical-align:middle;
      font-family:'Exo 2','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    }
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:rgba(255,255,255,.02)}

    .dbadge{
      font-size:9px;font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      letter-spacing:.5px;padding:2px 6px;border:1px solid;
    }
    .dl{color:#60A5FA;border-color:rgba(96,165,250,.35)}
    .ds{color:#F87171;border-color:rgba(248,113,113,.35)}

    .abadge{
      font-size:9px;font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      letter-spacing:.3px;padding:2px 5px;border:1px solid;
      max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
      display:inline-block;
    }

    .rp{color:var(--pos);font-weight:600}
    .rn{color:var(--neg);font-weight:600}
    .ro{color:var(--muted);font-size:11px}
    .sl-tag{
      font-size:8px;color:var(--neg);
      background:rgba(248,113,113,.12);
      padding:1px 4px;margin-left:4px;letter-spacing:.5px;
    }

    /* ── Footer ─────────────────────────────── */
    .ft{
      text-align:center;padding:20px 24px;
      font-size:11px;color:var(--muted);
      border-top:1px solid var(--border);
    }

    /* ── Skeleton ───────────────────────────── */
    .sk{
      background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 75%);
      background-size:200% 100%;
      animation:shimmer 1.5s infinite;
      border-radius:2px;
    }

    /* ── Animations ─────────────────────────── */
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes fadeSlide{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
    .new-row{animation:fadeSlide .3s ease}

    @media(prefers-reduced-motion:reduce){
      *{animation-duration:.01ms!important;transition-duration:.01ms!important}
    }

    /* ── Portfolio strip ─────────────────────────────────── */
    .port-strip{
      display:grid;
      grid-template-columns:1fr repeat(3,auto);
      align-items:center;gap:24px;
      background:var(--surface);
      border:1px solid var(--border);
      padding:14px 20px;
      margin-bottom:14px;
    }
    .port-label{
      font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      font-size:9px;letter-spacing:2px;color:var(--muted2);
    }
    .port-block{text-align:right}
    .port-title{font-size:10px;color:var(--muted);margin-bottom:3px}
    .port-val{
      font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      font-size:17px;font-weight:600;
    }
    .port-sub{font-size:11px;margin-top:2px}

    /* ── Algo card equity row ────────────────────────────── */
    .ac-equity{
      font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      font-size:13px;font-weight:600;
      color:var(--muted2);margin-bottom:5px;
    }
    .ac-hint{
      font-size:9px;color:var(--muted);
      letter-spacing:.3px;margin-top:3px;
    }
  </style>
</head>

<header class="hd" role="banner">

      <span class="live-dot" aria-hidden="true"></span>
      LIVE
    </div>
  </div>
</header>

<main class="wrap">

  <div class="port-strip" id="portfolioStrip" aria-label="Portfolio summary">
    <div>
      <div class="port-label">포트폴리오 — 알고리즘당 $1,000</div>

      <div class="ac" style="--ac:#64748B"><div class="sk" style="height:8px;width:60%;margin-bottom:10px"></div><div class="sk" style="height:21px;width:80%;margin-bottom:10px"></div><div class="sk" style="height:10px;width:90%"></div></div>
      <div class="ac" style="--ac:#64748B"><div class="sk" style="height:8px;width:60%;margin-bottom:10px"></div><div class="sk" style="height:21px;width:80%;margin-bottom:10px"></div><div class="sk" style="height:10px;width:90%"></div></div>
    </div>
  </section>

  <section aria-label="Equity curves chart">
    <div class="panel">
      <div class="ph">
        <span class="ptitle">자산 곡선</span>
        <span class="pmeta">누적 수익률 % · 시작 → 현재</span>
      </div>
      <div class="legend" id="chartLegend" aria-hidden="true"></div>
      <div style="position:relative;height:240px">
        <canvas id="eqChart"
          role="img"
          aria-label="Line chart showing cumulative return percentage for each algorithm since launch. Hover for values.">
        </canvas>
        <div id="chartPlaceholder" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:8px">

          <span style="font-family:'Orbitron','Apple SD Gothic Neo','Malgun Gothic',sans-serif;font-size:10px;letter-spacing:1.5px;color:#334155">첫 거래 청산 대기</span>
        </div>
      </div>
    </div>
  </section>

  <section aria-label="Trade log">
    <div class="panel">

          </tbody>
        </table>
      </div>
    </div>
  </section>

</main>

// ── State ─────────────────────────────────────────────────
let positions = [];
let eqChart = null;
let latestDecisions = {}; // algo_id → latest arena_decisions row

// ── Data processing ───────────────────────────────────────
let latestBtcPrice = null; // updated by fetchBtcPrice()

function algoStats(ps) {
  const out = {};
  for (const algo of ALGO_IDS) {
    const all  = ps.filter(p => p.algo_id === algo);
    const done = [...all.filter(p => p.status === 'closed' && p.ret_pct != null)]
      .sort((a, b) => new Date(a.close_time) - new Date(b.close_time));
    const open = all.find(p => p.status === 'open');
    const wins = done.filter(p => p.hit).length;

    // compounded equity from closed trades
    let equity = STARTING_CAPITAL;
    for (const p of done) equity *= (1 + (p.ret_pct || 0));

    // unrealized P&L for open position
    let unrealizedPct = null;
    let equityTotal = equity;
    if (open && latestBtcPrice && open.open_price) {
      const raw = (latestBtcPrice - open.open_price) / open.open_price;
      unrealizedPct = (open.direction === 'long' ? raw : -raw) * 100;
      equityTotal = equity * (1 + (open.direction === 'long' ? raw : -raw));
    }

    const totalRet = done.reduce((s, p) => s + p.ret_pct, 0) * 100;

    out[algo] = {
      totalRet:      parseFloat(totalRet.toFixed(2)),
      winRate:       done.length ? parseFloat((wins / done.length * 100).toFixed(1)) : null,
      closedN:       done.length,
      totalN:        all.length,
      pos:           open ? open.direction.toUpperCase() : 'FLAT',
      openEntry:     open ? open.open_price : null,
      unrealizedPct: unrealizedPct != null ? parseFloat(unrealizedPct.toFixed(2)) : null,
      hasAnyTrade:   all.length > 0,
      equity:        parseFloat(equity.toFixed(2)),
      equityTotal:   parseFloat(equityTotal.toFixed(2)),
      pnl:           parseFloat((equityTotal - STARTING_CAPITAL).toFixed(2)),
    };
  }
  return out;
}

const ALGO_NEEDS = {
  supertrend:     'ATR(10,3) band direction',
  fng_contrarian: 'FNG < 30 or FNG > 70',
  ema_cross:      '21 EMA / 55 EMA / 200 EMA alignment',
  macd_momentum:  'MACD hist + RSI + BB filter',
  bb_squeeze:     'BB width < 3.5% + position + RSI',
};

function signalHint(algo, dec) {
  if (dec) {
    const inp = (dec.reason && dec.reason.inputs) || {};
    const act = dec.action || '';
    if (act === 'hold') return null;
    switch (algo) {
      case 'supertrend':
        if (inp.supertrend_dir != null) return `ST dir: ${inp.supertrend_dir > 0 ? 'up' : 'down'}`;
        break;
      case 'ema_cross':
        if (inp.ema_21 != null) return `21/${inp.ema_21.toFixed(0)} 55/${inp.ema_55 != null ? inp.ema_55.toFixed(0) : '—'}`;
        break;
      case 'bb_squeeze':
        if (inp.bb_width != null) return `BB width ${inp.bb_width.toFixed(1)}%`;
        break;
      case 'fng_contrarian':
        if (inp.fng != null) return `FNG ${inp.fng}`;
        break;
      case 'macd_momentum':
        if (inp.macd_hist != null) return `MACD ${inp.macd_hist.toFixed(0)}`;
        break;
    }
  }
  return ALGO_NEEDS[algo] || null;
}

function equityCurves(ps) {
  const done = ps
    .filter(p => p.status === 'closed' && p.close_time && p.ret_pct != null)
    .sort((a, b) => new Date(a.close_time) - new Date(b.close_time));

  if (!done.length) return { labels: [], datasets: [] };

  const t0 = new Date(done[0].open_time);
  t0.setHours(0, 0, 0, 0);
  const t1 = new Date();

  const labels = [];
  const cur = new Date(t0);
  while (cur <= t1) {
    labels.push(cur.toISOString().split('T')[0]);
    cur.setDate(cur.getDate() + 1);
  }

  const datasets = ALGO_IDS.map(algo => {
    const ap = done.filter(p => p.algo_id === algo)
      .sort((a, b) => new Date(a.close_time) - new Date(b.close_time));
    let cum = 0, idx = 0;
    const data = labels.map(d => {
      const end = new Date(d + 'T23:59:59Z');
      while (idx < ap.length && new Date(ap[idx].close_time) <= end) {
        cum += ap[idx].ret_pct * 100;
        idx++;
      }
      return parseFloat(cum.toFixed(3));
    });
    const cfg = ALGOS[algo];
    return {
      label: algo, data,
      borderColor: cfg.color,
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.4,
      borderDash: cfg.dash || [],
    };
  });

  const tickLabels = labels.map(d => {
    const dt = new Date(d);
    return `${dt.getMonth() + 1}/${dt.getDate()}`;
  });

  return { labels: tickLabels, datasets };
}

// ── Render: algo cards ────────────────────────────────────
function renderCards(stats) {
  document.getElementById('algoGrid').innerHTML = ALGO_IDS.map(algo => {
    const s = stats[algo];
    const cfg = ALGOS[algo];
    const posCls = s.pos === 'LONG' ? 'pb-long' : s.pos === 'SHORT' ? 'pb-short' : 'pb-flat';
    const dec = latestDecisions[algo];

    // Equity display (always show $)
    const eqColor = s.pnl >= 0 ? '#34D399' : '#F87171';
    const eqSign  = s.pnl >= 0 ? '+' : '';
    const eqHtml = `<div class="ac-equity" style="color:${s.hasAnyTrade ? eqColor : 'var(--muted)'}" aria-label="Virtual equity">
      ${s.hasAnyTrade ? `$${s.equityTotal.toFixed(0)}` : '$1,000'}
      <span style="font-size:10px;opacity:.6;margin-left:4px">${s.hasAnyTrade ? `(${eqSign}${s.pnl.toFixed(2)})` : ''}</span>
    </div>`;

    // Return % line
    let retHtml;
    if (!s.hasAnyTrade) {
      retHtml = `<div class="ac-ret" style="color:var(--muted);font-size:14px">신호 대기</div>`;
    } else if (s.closedN === 0 && s.unrealizedPct != null) {
      const uc = s.unrealizedPct >= 0 ? '#34D399' : '#F87171';
      const us = s.unrealizedPct >= 0 ? '+' : '';
      retHtml = `<div class="ac-ret" style="color:${uc};opacity:.7">${us}${s.unrealizedPct.toFixed(2)}%<span style="font-size:9px;margin-left:4px;opacity:.6">미실현</span></div>`;
    } else {
      const rc = s.totalRet >= 0 ? '#34D399' : '#F87171';
      const sign = s.totalRet >= 0 ? '+' : '';
      retHtml = `<div class="ac-ret" style="color:${rc}">${sign}${s.totalRet.toFixed(2)}%</div>`;
    }

    // Stats line
    let statsLine;
    if (!s.hasAnyTrade) {
      statsLine = `<div style="color:var(--muted);font-size:10px">거래 없음</div>`;
    } else if (s.closedN === 0) {
      statsLine = `<div>1건 진입 · 청산 대기</div>`;
    } else {
      statsLine = `<div>${s.closedN}건 청산 · 승률 ${s.winRate.toFixed(0)}%</div>`;
    }

    // Signal hint (why flat)
    const hint = s.pos === 'FLAT' ? signalHint(algo, dec) : null;
    const hintHtml = hint ? `<div class="ac-hint">${hint}</div>` : '';

    return `<div class="ac" style="--ac:${cfg.color}" role="article" aria-label="${algo}">
      <div class="ac-name">${algo}</div>
      ${eqHtml}
      ${retHtml}
      <div class="ac-bottom">
        <div class="ac-stats">
          ${statsLine}
          ${s.openEntry ? `<div class="ac-entry">@ $${s.openEntry.toLocaleString()}</div>` : ''}
          ${hintHtml}
        </div>
        <span class="pb ${posCls}" aria-label="Position: ${s.pos}">${s.pos}</span>
      </div>
    </div>`;
  }).join('');
}

// ── Render: legend ────────────────────────────────────────
function renderLegend(stats) {
  document.getElementById('chartLegend').innerHTML = ALGO_IDS.map(algo => {
    const s = stats[algo];
    const cfg = ALGOS[algo];
    const lineStyle = cfg.dash
      ? `background:repeating-linear-gradient(90deg,${cfg.color} 0,${cfg.color} 5px,transparent 5px,transparent 8px)`
      : `background:${cfg.color}`;
    let retLabel;
    if (!s.hasAnyTrade || s.closedN === 0) {
      retLabel = `<span style="color:var(--muted)">—</span>`;
    } else {
      const sign = s.totalRet >= 0 ? '+' : '';
      const rc = s.totalRet >= 0 ? '#34D399' : '#F87171';
      retLabel = `<span style="color:${rc};font-weight:500">${sign}${s.totalRet.toFixed(2)}%</span>`;
    }
    return `<div class="li">
      <span class="ll" style="${lineStyle}" aria-hidden="true"></span>
      <span>${algo}</span>
      ${retLabel}
    </div>`;
  }).join('');
}

// ── Render: chart ─────────────────────────────────────────
function renderChart(curves) {
  const ctx = document.getElementById('eqChart');
  const placeholder = document.getElementById('chartPlaceholder');

  if (!curves.labels.length) {
    ctx.style.display = 'none';
    if (placeholder) placeholder.style.display = 'flex';
    return;
  }
  ctx.style.display = '';
  if (placeholder) placeholder.style.display = 'none';

  if (eqChart) {
    eqChart.data.labels = curves.labels;
    eqChart.data.datasets = curves.datasets;
    eqChart.update('none');
    return;
  }
  eqChart = new Chart(ctx, {
    type: 'line',
    data: { labels: curves.labels, datasets: curves.datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15,23,42,.95)',
          borderColor: 'rgba(255,255,255,.12)',
          borderWidth: 1,
          titleColor: '#94A3B8',
          bodyColor: '#F1F5F9',
          titleFont: { family: 'Exo 2', size: 11 },
          bodyFont: { family: 'Orbitron', size: 10 },
          callbacks: {
            label: c => {
              const v = c.parsed.y;
              return ` ${c.dataset.label}: ${v >= 0 ? '+' : ''}${v.toFixed(2)}%`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,.04)' },
          border: { color: 'rgba(255,255,255,.08)', display: false },
          ticks: { color: '#475569', font: { family: 'Exo 2', size: 10 }, maxTicksLimit: 8, maxRotation: 0 }
        },
        y: {
          grid: { color: 'rgba(255,255,255,.04)' },
          border: { color: 'rgba(255,255,255,.08)', display: false },
          ticks: {
            color: '#475569',
            font: { family: 'Exo 2', size: 10 },
            callback: v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%'
          }
        }
      }
    }
  });
}

// ── Render: trade log ─────────────────────────────────────
function renderLog(ps) {
  const sorted = [...ps].sort((a, b) => new Date(b.open_time) - new Date(a.open_time));
  const openN = ps.filter(p => p.status === 'open').length;
  document.getElementById('tradeCountLabel').textContent =
    `총 ${ps.length}건 · 진입 ${openN}건`;

  document.getElementById('tradeLogBody').innerHTML = sorted.map(p => {
    const cfg = ALGOS[p.algo_id] || { color: '#94A3B8' };
    const dt = new Date(p.open_time);
    const ts = dt.toLocaleString('ko-KR', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Seoul'
    });
    const dirCls = p.direction === 'long' ? 'dl' : 'ds';

    let retHtml;
    if (p.status === 'open') {
      retHtml = '<span class="ro">진입 중</span>';
    } else if (p.ret_pct != null) {
      const pct = (p.ret_pct * 100).toFixed(2);
      const sign = p.ret_pct >= 0 ? '+' : '';
      const sl = p.is_stop_loss ? '<span class="sl-tag">SL</span>' : '';
      retHtml = `<span class="${p.ret_pct >= 0 ? 'rp' : 'rn'}">${sign}${pct}%${sl}</span>`;
    } else {
      retHtml = '<span class="ro">—</span>';
    }

    const exit = p.close_price
      ? `$${p.close_price.toLocaleString()}`
      : `<span style="color:var(--muted)">—</span>`;
    const hold = p.hold_hours != null
      ? `${Math.round(p.hold_hours)}h`
      : `<span style="color:var(--muted)">—</span>`;

    return `<tr>
      <td style="color:var(--muted);font-size:11px">${ts}</td>
      <td><span class="abadge" style="color:${cfg.color};border-color:${cfg.color}40">${p.algo_id}</span></td>
      <td><span class="dbadge ${dirCls}">${p.direction.toUpperCase()}</span></td>
      <td style="font-size:12px">$${p.open_price.toLocaleString()}</td>
      <td style="font-size:12px;color:var(--muted2)">${exit}</td>
      <td>${retHtml}</td>
      <td style="color:var(--muted);font-size:11px">${hold}</td>
    </tr>`;
  }).join('');
}

// ── Render: portfolio strip ───────────────────────────────
function renderPortfolio(stats) {
  const totalStart = ALGO_IDS.length * STARTING_CAPITAL;
  let totalEquity = 0, realizedEquity = 0, openCount = 0;
  for (const algo of ALGO_IDS) {
    const s = stats[algo];
    totalEquity   += s.equityTotal;
    realizedEquity += s.equity;
    if (s.pos !== 'FLAT') openCount++;
  }
  const totalPnl    = totalEquity - totalStart;
  const totalPct    = (totalPnl / totalStart) * 100;
  const realPnl     = realizedEquity - totalStart;
  const realPct     = (realPnl / totalStart) * 100;
  const pnlColor    = totalPnl >= 0 ? '#34D399' : '#F87171';
  const realColor   = realPnl  >= 0 ? '#34D399' : '#F87171';
  const fmt = v => (v >= 0 ? '+' : '') + v.toFixed(2);

  document.getElementById('portTotal').innerHTML =
    `<span style="color:${pnlColor}">$${totalEquity.toFixed(0)}</span>`;
  document.getElementById('portTotalPct').innerHTML =
    `<span style="color:${pnlColor}">${fmt(totalPct)}% · $${totalStart.toLocaleString()} 대비</span>`;

  // 실현 손익 = 청산분만의 손익(델타). 자산 총액이 아니라 +/- 금액으로 표시.
  document.getElementById('portRealized').innerHTML =
    `<span style="color:${realColor}">${realPnl >= 0 ? '+$' : '-$'}${Math.abs(realPnl).toFixed(0)}</span>`;
  document.getElementById('portRealizedPct').innerHTML =
    `<span style="color:${realColor}">${fmt(realPct)}% · 청산분만</span>`;

  document.getElementById('portOpen').textContent = openCount;
  document.getElementById('portOpenSub').textContent =
    openCount === 1 ? '1개 진입 중' : `${openCount}개 진입 중`;
}

// ── Full render pipeline ──────────────────────────────────
function renderAll(ps) {
  positions = ps;
  const stats = algoStats(ps);
  const curves = equityCurves(ps);
  renderPortfolio(stats);
  renderCards(stats);
  renderLegend(stats);
  renderChart(curves);
  renderLog(ps);
  const verEl = document.getElementById('stratVer');
  if (verEl) {
    const v = ps.find(p => p.strategy_version)?.strategy_version;
    if (v) verEl.textContent = v;
  }
  const el = document.getElementById('lastUpdate');
  if (el) el.textContent = `${new Date().toLocaleTimeString('ko-KR')} 업데이트`;
}

// ── BTC price ticker ──────────────────────────────────────
async function fetchBtcPrice() {
  try {
    const r = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
    if (!r.ok) return;
    const d = await r.json();
    const price = parseFloat(d.lastPrice);
    latestBtcPrice = price;
    const chg = parseFloat(d.priceChangePercent);
    document.getElementById('btcPrice').textContent =
      '$' + price.toLocaleString('en-US', { maximumFractionDigits: 0 });
    const cel = document.getElementById('btcChg');
    cel.textContent = `${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%`;
    cel.className = 'btc-chg ' + (chg >= 0 ? 'pos-c' : 'neg-c');
    // refresh cards so unrealized P&L updates with new price
    if (positions.length) renderCards(algoStats(positions));
  } catch (_) {}
}

// ── Supabase fetch ────────────────────────────────────────
async function fetchDecisions(client) {
  try {
    const { data } = await client
      .from('arena_decisions')
      .select('algo_id, action, reason, created_at')
      .order('created_at', { ascending: false })
      .limit(25);
    if (!data) return {};
    const out = {};
    for (const d of data) {
      if (!out[d.algo_id]) out[d.algo_id] = d;
    }
    return out;
  } catch (_) { return {}; }
}

async function fetchPositions(client) {
  const { data, error } = await client
    .from('paper_positions')
    .select(`
      id, algo_id, direction, status,
      open_time, close_time,
      open_price, close_price,
      ret_pct, hit, hold_hours,
      is_stop_loss, strategy_version
    `)
    .order('open_time', { ascending: false })
    .limit(500);

  if (error) {
    console.error('[Arena] fetch error:', error.message);
    return null;
  }
  return data;
}

function setupRealtime(client) {
  client
    .channel('paper_positions_live')
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'paper_positions',
    }, async () => {
      const fresh = await fetchPositions(client);
      if (fresh) renderAll(fresh);
    })
    .subscribe(status => {
      const dot = document.querySelector('.live-dot');
      if (dot) {
        dot.style.background = status === 'SUBSCRIBED' ? '#34D399' : '#F59E0B';
      }
    });
}

// ── Init ──────────────────────────────────────────────────
async function init() {
  fetchBtcPrice();
  setInterval(fetchBtcPrice, 60_000);

  if (IS_MOCK) {
    console.warn('[Arena] Mock mode — set SUPABASE_URL & SUPABASE_ANON_KEY to connect live data.');
    renderAll(MOCK);
    return;
  }

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const [data, decisions] = await Promise.all([
    fetchPositions(client),
    fetchDecisions(client),
  ]);
  latestDecisions = decisions;
  if (data) {
    renderAll(data);
    setupRealtime(client);
  } else {
    console.warn('[Arena] Falling back to mock data.');
    renderAll(MOCK);
  }
}

document.addEventListener('DOMContentLoaded', init);
