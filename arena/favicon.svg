<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#08111C"/>
  <defs>
    <linearGradient id="face-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4EAFF"/>
      <stop offset="100%" stop-color="#4AABD8"/>
    </linearGradient>
    <linearGradient id="face-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2878B2"/>
      <stop offset="100%" stop-color="#3E9BD5"/>
    </linearGradient>
    <linearGradient id="face-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1458880"/>
      <stop offset="100%" stop-color="#1E6FA0"/>
    </linearGradient>
  </defs>
  <!-- Crystal block: 3 visible faces (isometric-ish) -->
  <!-- Top face -->
  <polygon points="7,14 16,9 25,14 16,19" fill="url(#face-top)"/>
  <!-- Left face -->
  <polygon points="7,14 16,19 16,27 7,22" fill="url(#face-left)"/>
  <!-- Right face -->
  <polygon points="16,19 25,14 25,22 16,27" fill="#1A5F8A"/>
  <!-- Specular highlight on top face -->
  <polygon points="7,14 13,11 16,12 10,15" fill="rgba(220,245,255,0.45)"/>
  <!-- Peak spike (top of crystal) -->
  <polygon points="16,9 19,6 22,9 16,9" fill="#9FDBF5"/>
</svg>
