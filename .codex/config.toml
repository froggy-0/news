#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.4"
personality = "pragmatic"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
model_reasoning_effort = "medium"
project_doc_fallback_filenames = ["agent.md", ".agents.md"]
project_doc_max_bytes = 65536

[mcp_servers.context7]
url = "https://context7-mcp--upstash.run.tools"
startup_timeout_sec = 20
tool_timeout_sec = 60
enabled = true
required = false

[features]
multi_agent = true
runtime_metrics = true
child_agents_md = true
prevent_idle_sleep = true

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800

[agents.explorer]
description = "코드베이스, 테스트, 로그를 빠르게 읽어 동작과 관련 파일을 먼저 좁히는 역할입니다."
config_file = "agents/explorer.toml"
nickname_candidates = ["Scout", "Mapper"]

[agents.pipeline_investigator]
description = "GitHub Actions, observability 로그, provider 장애, fallback 회귀를 우선 분석하는 역할입니다."
config_file = "agents/pipeline-investigator.toml"
nickname_candidates = ["Tracer", "Inspector"]

[agents.docs_researcher]
description = "OpenAI Codex나 외부 API 계약을 공식 문서 기준으로 먼저 확인하는 역할입니다."
config_file = "agents/docs-researcher.toml"
nickname_candidates = ["Archivist", "Docs"]

[agents.brief_reviewer]
description = "브리핑 생성, 검수, 재작성, fallback, 이메일 렌더링 품질을 먼저 좁히는 역할입니다."
config_file = "agents/brief-reviewer.toml"
nickname_candidates = ["Editor", "Reviewer"]

[agents.provider_auditor]
description = "공급자 계약, parser, ranking, fallback, retry 정책을 읽기 위주로 점검하는 역할입니다."
config_file = "agents/provider-auditor.toml"
nickname_candidates = ["Contract", "Audit"]

[agents.workflow_run_auditor]
description = "GitHub Actions run, observability 아티팩트, 저장 브리핑, 메일 원문을 함께 대조하는 역할입니다."
config_file = "agents/workflow-run-auditor.toml"
nickname_candidates = ["Runbook", "Trace"]

[agents.apps_operator]
description = "Morning Market Brief 운영 UI나 ChatGPT Apps SDK 기반 도구 설계를 맡는 역할입니다."
config_file = "agents/apps-operator.toml"
nickname_candidates = ["Widget", "Console"]
