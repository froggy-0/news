version: "1"

# 도메인 점수 및 계층 정책
# score_rationale: 도메인별 신뢰도 근거 (문서화 용도)
# score: float — _item_score() domain_score() 계산에 사용
# tier: "tier_1" | "tier_2" — 없으면 tier_3으로 처리

